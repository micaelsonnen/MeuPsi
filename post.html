<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title id="metaTitle">Artigo — Blog MeuPsi</title>
<meta id="metaDescription" name="description" content="Artigo do blog MeuPsi sobre saúde mental." />
<link id="metaCanonical" rel="canonical" href="https://micaeltatuagem.github.io/meupsi/post.html" />
<meta name="robots" content="index, follow, max-image-preview:large" />

<meta id="ogTitle" property="og:type" content="article" />
<meta id="ogTitleMeta" property="og:title" content="Artigo — Blog MeuPsi" />
<meta id="ogDescription" property="og:description" content="Artigo do blog MeuPsi sobre saúde mental." />
<meta id="ogUrl" property="og:url" content="https://micaeltatuagem.github.io/meupsi/post.html" />
<meta id="ogImage" property="og:image" content="" />
<meta property="og:site_name" content="MeuPsi" />
<meta property="og:locale" content="pt_BR" />

<script type="application/ld+json" id="ldJson"></script>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=Fraunces:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root {
  --cream: #FDF6F8; --rose-50: #FAF0F4; --rose-100: #F5E2EA; --rose-200: #ECC8D8;
  --mauve-300: #D4ABBE; --mauve-500: #B87FA0;
  --lila-300: #C9ADE0; --lila-500: #9B6FD8; --lila-700: #6B3FA8; --lila-900: #3B1E62;
  --verde-500: #5AB593; --verde-600: #3F9B7A;
  --gray-500: #7A6872; --gray-800: #2E2228;
  --font-display: 'Fraunces', Georgia, serif; --font-body: 'DM Sans', system-ui, sans-serif;
  --radius-sm: 8px; --radius-md: 14px; --radius-pill: 999px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-body); background: var(--cream); color: var(--gray-800); font-size: 16px; line-height: 1.6; }
img { max-width: 100%; display: block; }
a { text-decoration: none; color: inherit; }

nav { position: sticky; top: 0; z-index: 100; background: rgba(253,246,248,0.93); backdrop-filter: blur(12px); border-bottom: 1px solid var(--rose-100); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 64px; }
.nav-logo { font-family: var(--font-display); font-size: 22px; font-weight: 400; font-style: italic; color: var(--lila-700); }
.nav-logo span { color: var(--verde-500); font-style: normal; }
.nav-links { display: flex; align-items: center; gap: 1.75rem; }
.nav-links a { font-size: 14px; color: var(--gray-500); transition: color 0.2s; }
.nav-links a:hover { color: var(--lila-700); }
.btn { display: inline-flex; align-items: center; gap: 6px; border-radius: var(--radius-pill); font-family: var(--font-body); font-size: 14px; font-weight: 500; padding: 9px 20px; cursor: pointer; transition: all 0.18s; border: none; }
.btn-ghost { background: transparent; color: var(--gray-800); border: 1.5px solid var(--mauve-300); }
.btn-ghost:hover { border-color: var(--lila-300); color: var(--lila-700); }
.btn-primary { background: var(--verde-500); color: #fff; }
.btn-primary:hover { background: var(--verde-600); }

.breadcrumb { padding: 1rem 2rem; font-size: 13px; color: var(--mauve-300); max-width: 760px; margin: 0 auto; }
.breadcrumb a:hover { color: var(--lila-700); }
.breadcrumb span { margin: 0 6px; }

.wrap { max-width: 760px; margin: 0 auto; padding: 0 2rem; }

.post-cat-badge { display: inline-flex; font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--mauve-500); background: var(--rose-50); border: 1px solid var(--rose-100); padding: 4px 12px; border-radius: var(--radius-pill); margin: 1.5rem 0 1.1rem; }
h1.title { font-family: var(--font-display); font-weight: 300; font-size: clamp(1.9rem, 4.5vw, 2.6rem); line-height: 1.18; color: var(--lila-900); margin-bottom: 1.2rem; }
.byline { display: flex; align-items: center; gap: 10px; color: var(--gray-500); font-size: 14px; margin-bottom: 2rem; padding-bottom: 1.5rem; border-bottom: 1px solid var(--rose-100); }
.avatar { width: 38px; height: 38px; border-radius: 50%; background: var(--rose-200); color: var(--lila-700); display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-size: 14px; font-weight: 500; flex-shrink: 0; overflow: hidden; }
.avatar img { width: 100%; height: 100%; object-fit: cover; }

img.cover { width: 100%; aspect-ratio: 16/9; object-fit: cover; border-radius: var(--radius-md); margin-bottom: 2.2rem; background: var(--rose-100); }

.content { font-size: 17px; line-height: 1.8; }
.content h2 { font-family: var(--font-display); font-weight: 300; font-size: 1.45rem; color: var(--lila-900); margin: 2.2rem 0 1rem; }
.content h3 { font-family: var(--font-display); font-weight: 300; font-size: 1.18rem; color: var(--lila-700); margin: 1.8rem 0 0.8rem; }
.content p { margin-bottom: 1.2rem; }
.content ul, .content ol { margin: 0 0 1.2rem 1.4rem; }
.content blockquote { border-left: 3px solid var(--lila-300); padding: 1rem 1.4rem; margin: 1.6rem 0; background: var(--rose-50); border-radius: 0 var(--radius-sm) var(--radius-sm) 0; font-style: italic; color: var(--lila-700); }
.content img { border-radius: var(--radius-sm); margin: 1.4rem 0; }
.content a { color: var(--lila-500); text-decoration: underline; }

.tags { display: flex; flex-wrap: wrap; gap: 8px; margin: 2rem 0; }
.tag-pill { font-size: 11.5px; padding: 5px 12px; border: 1.5px solid var(--rose-200); border-radius: var(--radius-pill); color: var(--mauve-500); }

.author-card { display: flex; gap: 16px; background: var(--rose-50); border: 1.5px solid var(--rose-100); border-radius: var(--radius-md); padding: 1.4rem; margin: 2.5rem 0; }
.author-card .avatar { width: 52px; height: 52px; font-size: 1.15rem; flex-shrink: 0; }
.author-card h4 { font-family: var(--font-display); font-weight: 400; color: var(--lila-900); margin-bottom: 4px; }
.author-card p { font-size: 13.5px; color: var(--gray-500); margin-bottom: 6px; }
.author-card a { font-size: 13.5px; font-weight: 500; color: var(--lila-700); }

.relacionados { background: var(--rose-50); padding: 3rem 2rem; margin-top: 3rem; }
.relacionados .inner { max-width: 760px; margin: 0 auto; }
.section-label { font-size: 11px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--mauve-500); margin-bottom: 0.5rem; }
.section-title { font-family: var(--font-display); font-weight: 300; font-size: 1.35rem; color: var(--lila-900); margin-bottom: 1.4rem; }
.rel-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
.rel-card { background: var(--cream); border: 1.5px solid var(--rose-200); border-radius: var(--radius-md); overflow: hidden; transition: box-shadow .2s, transform .2s; }
.rel-card:hover { box-shadow: 0 6px 20px rgba(155,111,216,0.1); transform: translateY(-2px); }
.rel-card img { aspect-ratio: 4/3; object-fit: cover; background: var(--rose-100); }
.rel-card .b { padding: 0.9rem 1rem; }
.rel-card .cat { font-size: 10px; letter-spacing: 0.07em; text-transform: uppercase; color: var(--mauve-500); margin-bottom: 4px; }
.rel-card h4 { font-family: var(--font-display); font-weight: 400; font-size: 0.96rem; color: var(--lila-900); line-height: 1.35; }

.loading-state, .error-box { padding: 5rem 0; text-align: center; color: var(--mauve-300); }

footer { background: var(--lila-900); color: var(--lila-300); padding: 3rem 2rem 2rem; }
.footer-copy { max-width: 1080px; margin: 0 auto; font-size: 12px; }

@media (max-width: 640px) {
  .nav-links a:not(.btn-primary) { display: none; }
  .rel-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">Meu<span>Psi</span></a>
  <div class="nav-links">
    <a href="index.html#psicologos">Psicólogos</a>
    <a href="blog.html">Blog</a>
    <a href="login.html" class="btn btn-ghost">Entrar</a>
  </div>
</nav>

<main id="main" class="wrap">
  <div class="loading-state">Carregando artigo…</div>
</main>

<footer>
  <div class="footer-copy">© <span id="year"></span> MeuPsi · Conteúdo escrito e revisado por psicólogos verificados</div>
</footer>

<script>
  document.getElementById('year').textContent = new Date().getFullYear();

  const SUPABASE_URL = 'https://ipjdmdjlrnfqtnqfnydn.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_2u0U4PTZuMNCS4LkTgnBBQ_ltfjZYqo';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  function escapeHTML(str){ const d = document.createElement('div'); d.textContent = str || ''; return d.innerHTML; }

  function readingTime(html){
    const text = (html || '').replace(/<[^>]*>/g,' ');
    const words = text.trim().split(/\s+/).filter(Boolean).length;
    return Math.max(1, Math.round(words / 200));
  }

  function formatDate(iso){
    if(!iso) return '';
    return new Date(iso).toLocaleDateString('pt-BR', { day:'2-digit', month:'long', year:'numeric' });
  }

  function setSEO(post){
    const url = `https://micaeltatuagem.github.io/meupsi/post.html?slug=${encodeURIComponent(post.slug)}`;
    const desc = post.resumo || 'Artigo do blog MeuPsi sobre saúde mental.';
    const img = post.imagem_capa || '';

    document.title = `${post.titulo} — Blog MeuPsi`;
    document.getElementById('metaTitle').textContent = `${post.titulo} — Blog MeuPsi`;
    document.getElementById('metaDescription').setAttribute('content', desc);
    document.getElementById('metaCanonical').setAttribute('href', url);
    document.getElementById('ogTitleMeta').setAttribute('content', post.titulo);
    document.getElementById('ogDescription').setAttribute('content', desc);
    document.getElementById('ogUrl').setAttribute('content', url);
    document.getElementById('ogImage').setAttribute('content', img);

    document.getElementById('ldJson').textContent = JSON.stringify({
      "@context": "https://schema.org",
      "@type": "BlogPosting",
      "headline": post.titulo,
      "description": desc,
      "image": img,
      "datePublished": post.publicado_em,
      "dateModified": post.updated_at || post.publicado_em,
      "mainEntityOfPage": { "@type": "WebPage", "@id": url },
      "author": { "@type": "Person", "name": post.psicologos?.nome || "Equipe MeuPsi" },
      "publisher": { "@type": "Organization", "name": "MeuPsi" }
    });
  }

  async function loadPost(){
    const slug = new URLSearchParams(location.search).get('slug');
    const main = document.getElementById('main');

    if(!slug){
      main.innerHTML = `<div class="error-box">Artigo não especificado. <a href="blog.html" style="color:var(--lila-500);text-decoration:underline">Voltar ao blog</a></div>`;
      return;
    }

    const { data: post, error } = await sb
      .from('blog_posts')
      .select('*, psicologos(id, nome, foto_url, bio)')
      .eq('slug', slug)
      .eq('status', 'publicado')
      .single();

    if(error || !post){
      main.innerHTML = `<div class="error-box">Não encontramos esse artigo. <a href="blog.html" style="color:var(--lila-500);text-decoration:underline">Voltar ao blog</a></div>`;
      return;
    }

    setSEO(post);

    const authorName = post.psicologos?.nome || 'Equipe MeuPsi';
    const authorInitial = authorName.charAt(0).toUpperCase();
    const authorPhoto = post.psicologos?.foto_url;

    main.innerHTML = `
      <nav aria-label="Breadcrumb" style="position:static;background:none;backdrop-filter:none;border:none;height:auto;padding:0;display:block;">
        <div class="breadcrumb" style="padding-left:0;padding-right:0;">
          <a href="index.html">Início</a><span>›</span>
          <a href="blog.html">Blog</a><span>›</span>
          <span style="color:var(--gray-500)">${escapeHTML(post.categoria || 'Artigo')}</span>
        </div>
      </nav>
      <span class="post-cat-badge">${escapeHTML(post.categoria || 'Saúde Mental')} · ${readingTime(post.conteudo)} min de leitura</span>
      <h1 class="title">${escapeHTML(post.titulo)}</h1>
      <div class="byline">
        <div class="avatar">${authorPhoto ? `<img src="${escapeHTML(authorPhoto)}" alt="${escapeHTML(authorName)}">` : escapeHTML(authorInitial)}</div>
        <div>por <strong>${escapeHTML(authorName)}</strong> · ${formatDate(post.publicado_em)}</div>
      </div>
      ${post.imagem_capa ? `<img class="cover" src="${escapeHTML(post.imagem_capa)}" alt="${escapeHTML(post.titulo)}">` : ''}
      <article class="content">${post.conteudo || ''}</article>
      ${post.tags?.length ? `<div class="tags">${post.tags.map(t=>`<span class="tag-pill">#${escapeHTML(t)}</span>`).join('')}</div>` : ''}
      <div class="author-card">
        <div class="avatar">${authorPhoto ? `<img src="${escapeHTML(authorPhoto)}" alt="${escapeHTML(authorName)}">` : escapeHTML(authorInitial)}</div>
        <div>
          <h4>${escapeHTML(authorName)}</h4>
          <p>${escapeHTML(post.psicologos?.bio || 'Psicólogo(a) verificado(a) na plataforma MeuPsi.')}</p>
          ${post.psicologos?.id ? `<a href="perfil.html?id=${encodeURIComponent(post.psicologos.id)}">Ver perfil e agendar consulta →</a>` : ''}
        </div>
      </div>
      <section id="related"></section>
    `;

    loadRelated(post);
  }

  async function loadRelated(post){
    const { data } = await sb
      .from('blog_posts')
      .select('titulo, slug, imagem_capa, categoria')
      .eq('status', 'publicado')
      .eq('categoria', post.categoria)
      .neq('id', post.id)
      .limit(2);

    const box = document.getElementById('related');
    if(!data || !data.length) return;

    box.innerHTML = `
      <div class="relacionados">
        <div class="inner">
          <p class="section-label">Continue lendo</p>
          <h3 class="section-title">Mais sobre ${escapeHTML(post.categoria)}</h3>
          <div class="rel-grid">
            ${data.map(p => `
              <a class="rel-card" href="post.html?slug=${encodeURIComponent(p.slug)}">
                <img src="${escapeHTML(p.imagem_capa) || 'https://placehold.co/300x225/F5E2EA/6B3FA8?text=MeuPsi'}" alt="" loading="lazy">
                <div class="b">
                  <p class="cat">${escapeHTML(p.categoria || '')}</p>
                  <h4>${escapeHTML(p.titulo)}</h4>
                </div>
              </a>
            `).join('')}
          </div>
        </div>
      </div>
    `;
  }

  loadPost();
</script>
</body>
</html>
