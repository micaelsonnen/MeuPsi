<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Estes valores são substituídos dinamicamente via JS assim que o post carrega,
     o que garante título/descrição corretos para compartilhamento e indexação. -->
<title id="metaTitle">Artigo — Blog MeuPsi</title>
<meta id="metaDescription" name="description" content="Artigo do blog MeuPsi sobre saúde mental.">
<link id="metaCanonical" rel="canonical" href="https://meupsi.com.br/post.html">
<meta name="robots" content="index, follow, max-image-preview:large">

<meta id="ogType" property="og:type" content="article">
<meta id="ogTitle" property="og:title" content="Artigo — Blog MeuPsi">
<meta id="ogDescription" property="og:description" content="Artigo do blog MeuPsi sobre saúde mental.">
<meta id="ogUrl" property="og:url" content="https://meupsi.com.br/post.html">
<meta id="ogImage" property="og:image" content="https://meupsi.com.br/assets/og-blog.jpg">
<meta property="og:site_name" content="MeuPsi">
<meta property="og:locale" content="pt_BR">

<meta name="twitter:card" content="summary_large_image">
<meta id="twTitle" name="twitter:title" content="Artigo — Blog MeuPsi">
<meta id="twDescription" name="twitter:description" content="Artigo do blog MeuPsi.">
<meta id="twImage" name="twitter:image" content="https://meupsi.com.br/assets/og-blog.jpg">

<script type="application/ld+json" id="ldJson"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root{
    --ink:#1F2C29; --paper:#EFEDE6; --paper-raised:#FAF9F5;
    --forest:#3E6259; --forest-dark:#2C463F; --clay:#C4633A;
    --line:#D9D5C9; --muted:#6B6F69;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:'Inter',sans-serif;line-height:1.6;}
  a{color:var(--forest-dark);}
  .wrap{max-width:760px;margin:0 auto;padding:0 24px;}

  header.site{border-bottom:1px solid var(--line);background:var(--paper-raised);}
  .site-bar{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;max-width:1080px;margin:0 auto;}
  .brand{font-family:'Fraunces',serif;font-weight:600;font-size:1.3rem;letter-spacing:-0.02em;text-decoration:none;color:var(--ink);}
  .brand span{color:var(--forest);}
  nav.site a{margin-left:28px;font-size:0.92rem;color:var(--muted);text-decoration:none;}
  nav.site a:hover{color:var(--ink);}

  .post-meta-bar{font-family:'IBM Plex Mono',monospace;font-size:0.74rem;text-transform:uppercase;letter-spacing:.06em;color:var(--clay);margin:48px 0 14px;display:flex;gap:14px;flex-wrap:wrap;}
  h1.title{font-family:'Fraunces',serif;font-weight:500;font-size:clamp(2rem,4.5vw,2.7rem);line-height:1.1;margin:0 0 18px;}
  .byline{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:0.9rem;margin-bottom:28px;padding-bottom:28px;border-bottom:1px solid var(--line);}
  .byline .avatar{width:36px;height:36px;border-radius:50%;background:var(--forest);color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-size:0.95rem;}

  img.cover{width:100%;aspect-ratio:16/9;object-fit:cover;border-radius:2px;margin-bottom:8px;background:var(--line);}
  .cover-caption{font-family:'IBM Plex Mono',monospace;font-size:0.7rem;color:var(--muted);margin-bottom:32px;}

  .content{font-size:1.08rem;}
  .content h2{font-family:'Fraunces',serif;font-weight:500;font-size:1.5rem;margin:40px 0 14px;}
  .content h3{font-family:'Fraunces',serif;font-weight:500;font-size:1.2rem;margin:32px 0 12px;}
  .content p{margin:0 0 18px;}
  .content ul,.content ol{margin:0 0 18px;padding-left:22px;}
  .content blockquote{border-left:3px solid var(--clay);margin:24px 0;padding:4px 0 4px 18px;color:var(--muted);font-style:italic;}
  .content img{max-width:100%;border-radius:2px;}

  .tags{display:flex;flex-wrap:wrap;gap:8px;margin:36px 0;}
  .tag-pill{font-family:'IBM Plex Mono',monospace;font-size:0.72rem;padding:5px 12px;border:1px solid var(--line);border-radius:20px;color:var(--muted);}

  .author-card{display:flex;gap:16px;background:var(--paper-raised);border:1px solid var(--line);border-radius:4px;padding:22px;margin:40px 0;}
  .author-card .avatar{width:54px;height:54px;border-radius:50%;background:var(--forest);color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-size:1.3rem;flex-shrink:0;}
  .author-card h4{margin:0 0 4px;font-family:'Fraunces',serif;font-weight:500;}
  .author-card p{margin:0;color:var(--muted);font-size:0.88rem;}
  .author-card a{font-size:0.85rem;font-weight:600;}

  .related{padding:40px 0 70px;border-top:1px solid var(--line);margin-top:30px;}
  .related h3{font-family:'Fraunces',serif;font-weight:500;font-size:1.2rem;}
  .related-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-top:20px;}
  .related-grid a{text-decoration:none;color:inherit;}
  .related-grid img{width:100%;aspect-ratio:4/3;object-fit:cover;border-radius:2px;margin-bottom:10px;background:var(--line);}
  .related-grid h4{font-family:'Fraunces',serif;font-weight:500;font-size:1rem;margin:0;}

  .loading,.error-box{padding:80px 0;text-align:center;color:var(--muted);font-family:'IBM Plex Mono',monospace;font-size:0.85rem;}

  footer.site{border-top:1px solid var(--line);padding:32px 0;text-align:center;color:var(--muted);font-size:0.82rem;}

  @media(max-width:600px){
    nav.site{display:none;}
    .related-grid{grid-template-columns:1fr;}
  }
  :focus-visible{outline:2px solid var(--forest);outline-offset:2px;}
</style>
</head>
<body>

<header class="site">
  <div class="site-bar">
    <a href="index.html" class="brand">Meu<span>Psi</span></a>
    <nav class="site">
      <a href="index.html">Início</a>
      <a href="blog.html">Blog</a>
      <a href="login.html">Entrar</a>
    </nav>
  </div>
</header>

<main class="wrap" id="main">
  <div class="loading">Carregando artigo…</div>
</main>

<footer class="site">
  <div class="wrap">© <span id="year"></span> MeuPsi · Conteúdo escrito e revisado por psicólogos verificados</div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  document.getElementById('year').textContent = new Date().getFullYear();

  // ===== CONFIGURE AQUI =====
  const SUPABASE_URL = 'https://ipjdmdjlrnfqtnqfnydn.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_2u0U4PTZuMNCS4LkTgnBBQ_ltfjZYqo';
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  function escapeHTML(str){
    const d = document.createElement('div');
    d.textContent = str || '';
    return d.innerHTML;
  }

  function readingTime(html){
    const text = (html || '').replace(/<[^>]*>/g,' ');
    const words = text.trim().split(/\s+/).filter(Boolean).length;
    return Math.max(1, Math.round(words / 200));
  }

  function formatDate(iso){
    if(!iso) return '';
    return new Date(iso).toLocaleDateString('pt-BR', { day:'2-digit', month:'long', year:'numeric' });
  }

  function setSEO(post){
    const url = `https://meupsi.com.br/post.html?slug=${encodeURIComponent(post.slug)}`;
    const desc = post.resumo || 'Artigo do blog MeuPsi sobre saúde mental.';
    const img = post.imagem_capa || 'https://meupsi.com.br/assets/og-blog.jpg';

    document.title = `${post.titulo} — Blog MeuPsi`;
    document.getElementById('metaTitle').textContent = `${post.titulo} — Blog MeuPsi`;
    document.getElementById('metaDescription').setAttribute('content', desc);
    document.getElementById('metaCanonical').setAttribute('href', url);
    document.getElementById('ogTitle').setAttribute('content', post.titulo);
    document.getElementById('ogDescription').setAttribute('content', desc);
    document.getElementById('ogUrl').setAttribute('content', url);
    document.getElementById('ogImage').setAttribute('content', img);
    document.getElementById('twTitle').setAttribute('content', post.titulo);
    document.getElementById('twDescription').setAttribute('content', desc);
    document.getElementById('twImage').setAttribute('content', img);

    document.getElementById('ldJson').textContent = JSON.stringify({
      "@context": "https://schema.org",
      "@type": "BlogPosting",
      "headline": post.titulo,
      "description": desc,
      "image": img,
      "datePublished": post.publicado_em,
      "dateModified": post.updated_at || post.publicado_em,
      "mainEntityOfPage": { "@type": "WebPage", "@id": url },
      "author": {
        "@type": "Person",
        "name": post.psicologos?.nome || "Equipe MeuPsi"
      },
      "publisher": {
        "@type": "Organization",
        "name": "MeuPsi",
        "logo": { "@type": "ImageObject", "url": "https://meupsi.com.br/assets/logo.png" }
      }
    });
  }

  async function loadPost(){
    const slug = new URLSearchParams(location.search).get('slug');
    const main = document.getElementById('main');

    if(!slug){
      main.innerHTML = `<div class="error-box">Artigo não especificado. <a href="blog.html">Voltar ao blog</a></div>`;
      return;
    }

    const { data: post, error } = await supabase
      .from('blog_posts')
      .select('*, psicologos(nome, foto_url, bio, slug)')
      .eq('slug', slug)
      .eq('status', 'publicado')
      .single();

    if(error || !post){
      main.innerHTML = `<div class="error-box">Não encontramos esse artigo. <a href="blog.html">Voltar ao blog</a></div>`;
      return;
    }

    setSEO(post);

    const authorName = post.psicologos?.nome || 'Equipe MeuPsi';
    const authorInitial = authorName.charAt(0).toUpperCase();

    main.innerHTML = `
      <div class="post-meta-bar">
        <span>${escapeHTML(post.categoria || 'Saúde Mental')}</span>
        <span>${formatDate(post.publicado_em)}</span>
        <span>${readingTime(post.conteudo)} min de leitura</span>
      </div>
      <h1 class="title">${escapeHTML(post.titulo)}</h1>
      <div class="byline">
        <div class="avatar">${escapeHTML(authorInitial)}</div>
        <div>por <strong>${escapeHTML(authorName)}</strong></div>
      </div>
      ${post.imagem_capa ? `<img class="cover" src="${escapeHTML(post.imagem_capa)}" alt="${escapeHTML(post.titulo)}">` : ''}
      <article class="content">${post.conteudo || ''}</article>
      ${post.tags?.length ? `<div class="tags">${post.tags.map(t=>`<span class="tag-pill">#${escapeHTML(t)}</span>`).join('')}</div>` : ''}
      <div class="author-card">
        <div class="avatar">${escapeHTML(authorInitial)}</div>
        <div>
          <h4>${escapeHTML(authorName)}</h4>
          <p>${escapeHTML(post.psicologos?.bio || 'Psicólogo(a) verificado(a) na plataforma MeuPsi.')}</p>
          ${post.psicologos?.slug ? `<a href="perfil.html?slug=${encodeURIComponent(post.psicologos.slug)}">Ver perfil e agendar consulta →</a>` : ''}
        </div>
      </div>
      <section class="related" id="related"></section>
    `;

    loadRelated(post);
  }

  async function loadRelated(post){
    const { data } = await supabase
      .from('blog_posts')
      .select('titulo, slug, imagem_capa, resumo')
      .eq('status', 'publicado')
      .eq('categoria', post.categoria)
      .neq('id', post.id)
      .limit(2);

    const box = document.getElementById('related');
    if(!data || !data.length){ box.remove(); return; }

    box.innerHTML = `
      <h3>Continue lendo sobre ${escapeHTML(post.categoria)}</h3>
      <div class="related-grid">
        ${data.map(p => `
          <a href="post.html?slug=${encodeURIComponent(p.slug)}">
            <img src="${escapeHTML(p.imagem_capa) || 'https://placehold.co/300x225/EFEDE6/3E6259?text=MeuPsi'}" alt="" loading="lazy">
            <h4>${escapeHTML(p.titulo)}</h4>
          </a>
        `).join('')}
      </div>
    `;
  }

  loadPost();
</script>
</body>
</html>
