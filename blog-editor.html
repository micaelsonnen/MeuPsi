<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editor do Blog — MeuPsi</title>
<meta name="robots" content="noindex, nofollow">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root{
    --ink:#1F2C29; --paper:#EFEDE6; --paper-raised:#FAF9F5;
    --forest:#3E6259; --forest-dark:#2C463F; --clay:#C4633A;
    --line:#D9D5C9; --muted:#6B6F69; --danger:#B3432F;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:'Inter',sans-serif;}
  a{color:inherit;}
  button{font-family:inherit;cursor:pointer;}

  header.site{border-bottom:1px solid var(--line);background:var(--paper-raised);}
  .site-bar{display:flex;align-items:center;justify-content:space-between;padding:18px 28px;}
  .brand{font-family:'Fraunces',serif;font-weight:600;font-size:1.2rem;text-decoration:none;color:var(--ink);}
  .brand span{color:var(--forest);}
  .top-actions{display:flex;gap:10px;align-items:center;}

  .layout{display:grid;grid-template-columns:300px 1fr;min-height:calc(100vh - 64px);}
  .sidebar{border-right:1px solid var(--line);background:var(--paper-raised);padding:24px;}
  .sidebar h2{font-family:'Fraunces',serif;font-size:1.05rem;font-weight:500;margin:0 0 16px;}
  .new-btn{width:100%;background:var(--forest);color:#fff;border:none;border-radius:4px;padding:11px;font-weight:600;font-size:0.9rem;margin-bottom:20px;}
  .new-btn:hover{background:var(--forest-dark);}

  .post-list-item{padding:12px 10px;border-radius:4px;cursor:pointer;margin-bottom:4px;border:1px solid transparent;}
  .post-list-item:hover{background:#fff;}
  .post-list-item.active{background:#fff;border-color:var(--line);}
  .post-list-item h4{margin:0 0 4px;font-size:0.88rem;font-weight:600;line-height:1.3;}
  .post-list-item .meta-row{display:flex;gap:8px;align-items:center;font-family:'IBM Plex Mono',monospace;font-size:0.68rem;color:var(--muted);}
  .status-dot{width:7px;height:7px;border-radius:50%;display:inline-block;}
  .status-dot.publicado{background:#3E6259;}
  .status-dot.rascunho{background:#A8A398;}
  .status-dot.agendado{background:var(--clay);}

  .editor-area{padding:32px 40px 80px;max-width:760px;}
  .field{margin-bottom:20px;}
  .field label{display:block;font-family:'IBM Plex Mono',monospace;font-size:0.72rem;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:7px;}
  .field input[type=text], .field textarea, .field select{
    width:100%;border:1px solid var(--line);border-radius:4px;padding:11px 13px;font-family:'Inter';font-size:0.95rem;background:#fff;outline:none;
  }
  .field input[type=text]:focus, .field textarea:focus, .field select:focus{border-color:var(--forest);}
  .title-input{font-family:'Fraunces',serif;font-size:1.7rem;font-weight:500;border:none;border-bottom:2px solid var(--line);border-radius:0;padding:6px 0;background:transparent;}
  .title-input:focus{border-color:var(--forest);}
  .slug-row{font-family:'IBM Plex Mono',monospace;font-size:0.8rem;color:var(--muted);margin-top:6px;}
  .slug-row span{color:var(--forest-dark);}
  textarea{resize:vertical;min-height:64px;}

  .row2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}

  .cover-uploader{border:1.5px dashed var(--line);border-radius:6px;padding:18px;text-align:center;cursor:pointer;background:#fff;}
  .cover-uploader:hover{border-color:var(--forest);}
  .cover-uploader img{max-width:100%;max-height:180px;border-radius:4px;display:block;margin:0 auto 10px;}
  .cover-uploader .hint{font-size:0.82rem;color:var(--muted);}

  .toolbar{display:flex;gap:4px;flex-wrap:wrap;border:1px solid var(--line);border-bottom:none;border-radius:4px 4px 0 0;background:#fff;padding:8px;}
  .toolbar button{border:1px solid transparent;background:transparent;border-radius:4px;width:32px;height:32px;font-size:0.95rem;color:var(--ink);}
  .toolbar button:hover{background:var(--paper);}
  .toolbar button.sep{width:1px;background:var(--line);margin:4px 4px;cursor:default;}
  .toolbar button.sep:hover{background:var(--line);}
  #editorContent{
    border:1px solid var(--line);border-radius:0 0 4px 4px;padding:18px;min-height:340px;background:#fff;font-size:1rem;line-height:1.65;outline:none;
  }
  #editorContent:focus{border-color:var(--forest);}
  #editorContent h2{font-family:'Fraunces',serif;font-size:1.4rem;margin:18px 0 8px;}
  #editorContent h3{font-family:'Fraunces',serif;font-size:1.15rem;margin:16px 0 8px;}
  #editorContent blockquote{border-left:3px solid var(--clay);margin:14px 0;padding-left:14px;color:var(--muted);font-style:italic;}
  #editorContent img{max-width:100%;border-radius:4px;}
  #editorContent p{margin:0 0 10px;}

  .tag-input-wrap{display:flex;flex-wrap:wrap;gap:6px;border:1px solid var(--line);border-radius:4px;padding:8px;background:#fff;}
  .tag-chip{font-family:'IBM Plex Mono',monospace;font-size:0.72rem;background:var(--paper);padding:4px 8px;border-radius:14px;display:flex;align-items:center;gap:6px;}
  .tag-chip button{background:none;border:none;color:var(--muted);font-size:0.85rem;line-height:1;padding:0;}
  .tag-input-wrap input{border:none;outline:none;flex:1;min-width:90px;font-size:0.88rem;}

  .save-bar{position:sticky;bottom:0;background:var(--paper-raised);border-top:1px solid var(--line);padding:16px 0;display:flex;gap:10px;align-items:center;margin-top:30px;}
  .btn{border:none;border-radius:4px;padding:10px 18px;font-weight:600;font-size:0.88rem;}
  .btn-primary{background:var(--forest);color:#fff;}
  .btn-primary:hover{background:var(--forest-dark);}
  .btn-ghost{background:transparent;border:1px solid var(--line);color:var(--ink);}
  .btn-ghost:hover{border-color:var(--forest);color:var(--forest-dark);}
  .btn-danger{background:transparent;color:var(--danger);border:1px solid var(--line);}
  .btn-danger:hover{border-color:var(--danger);}
  .save-status{font-family:'IBM Plex Mono',monospace;font-size:0.75rem;color:var(--muted);margin-left:auto;}

  .schedule-field{display:none;}
  .schedule-field.visible{display:block;}

  .gate, .loading-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;font-family:'IBM Plex Mono',monospace;color:var(--muted);text-align:center;padding:20px;}
  .gate a{color:var(--forest-dark);font-weight:600;}

  @media(max-width:880px){
    .layout{grid-template-columns:1fr;}
    .sidebar{display:none;}
    .editor-area{padding:24px;}
    .row2{grid-template-columns:1fr;}
  }
</style>
</head>
<body>

<div id="gateScreen" class="loading-screen">Verificando acesso…</div>

<div id="app" style="display:none;">
  <header class="site">
    <div class="site-bar">
      <a href="dashboard.html" class="brand">Meu<span>Psi</span> · Editor</a>
      <div class="top-actions">
        <a href="blog.html" class="btn btn-ghost" style="text-decoration:none;display:inline-block;">Ver blog</a>
        <a href="dashboard.html" class="btn btn-ghost" style="text-decoration:none;display:inline-block;">Sair do editor</a>
      </div>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <button class="new-btn" id="newPostBtn">+ Novo artigo</button>
      <h2>Seus artigos</h2>
      <div id="postList"></div>
    </aside>

    <main class="editor-area">
      <div class="field">
        <input type="text" id="titulo" class="title-input" placeholder="Título do artigo" maxlength="150">
        <div class="slug-row">URL: meupsi.com.br/post.html?slug=<span id="slugPreview">seu-titulo-aqui</span></div>
      </div>

      <div class="field">
        <label>Resumo (aparece na listagem e nas redes sociais)</label>
        <textarea id="resumo" maxlength="220" placeholder="Em até 220 caracteres, resuma a ideia central do artigo."></textarea>
      </div>

      <div class="field">
        <label>Imagem de capa</label>
        <div class="cover-uploader" id="coverUploader">
          <img id="coverPreview" style="display:none;">
          <div class="hint" id="coverHint">Clique para enviar uma imagem (JPG ou PNG, recomendado 1200×675px)</div>
        </div>
        <input type="file" id="coverFile" accept="image/*" style="display:none;">
      </div>

      <div class="row2">
        <div class="field">
          <label>Categoria</label>
          <select id="categoria">
            <option>Saúde Mental</option>
            <option>Ansiedade</option>
            <option>Depressão</option>
            <option>Relacionamentos</option>
            <option>Autoestima</option>
            <option>Terapia Infantil</option>
            <option>Burnout</option>
          </select>
        </div>
        <div class="field">
          <label>Status</label>
          <select id="status">
            <option value="rascunho">Rascunho</option>
            <option value="publicado">Publicar agora</option>
            <option value="agendado">Agendar</option>
          </select>
        </div>
      </div>

      <div class="field schedule-field" id="scheduleField">
        <label>Data e hora da publicação</label>
        <input type="text" id="agendadoPara" placeholder="aaaa-mm-ddThh:mm" onfocus="(this.type='datetime-local')">
      </div>

      <div class="field">
        <label>Tags</label>
        <div class="tag-input-wrap" id="tagWrap">
          <input type="text" id="tagInput" placeholder="Digite e aperte Enter">
        </div>
      </div>

      <div class="field">
        <label>Conteúdo</label>
        <div class="toolbar">
          <button type="button" data-cmd="bold" title="Negrito"><b>B</b></button>
          <button type="button" data-cmd="italic" title="Itálico"><i>I</i></button>
          <button class="sep"></button>
          <button type="button" data-cmd="formatBlock" data-val="H2" title="Título">H2</button>
          <button type="button" data-cmd="formatBlock" data-val="H3" title="Subtítulo">H3</button>
          <button type="button" data-cmd="formatBlock" data-val="P" title="Parágrafo">P</button>
          <button class="sep"></button>
          <button type="button" data-cmd="insertUnorderedList" title="Lista">•</button>
          <button type="button" data-cmd="insertOrderedList" title="Lista numerada">1.</button>
          <button type="button" data-cmd="formatBlock" data-val="BLOCKQUOTE" title="Citação">"</button>
          <button class="sep"></button>
          <button type="button" id="insertLinkBtn" title="Link">🔗</button>
          <button type="button" id="insertImageBtn" title="Imagem">🖼</button>
          <button class="sep"></button>
          <button type="button" data-cmd="removeFormat" title="Limpar formatação">⨯</button>
        </div>
        <div id="editorContent" contenteditable="true" data-placeholder="Escreva o artigo aqui..."></div>
      </div>

      <div class="save-bar">
        <button class="btn btn-primary" id="saveBtn">Salvar</button>
        <button class="btn btn-ghost" id="previewBtn">Pré-visualizar</button>
        <button class="btn btn-danger" id="deleteBtn" style="display:none;">Excluir artigo</button>
        <span class="save-status" id="saveStatus"></span>
      </div>
    </main>
  </div>
</div>

<input type="file" id="bodyImageFile" accept="image/*" style="display:none;">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // ===== CONFIGURE AQUI =====
  const SUPABASE_URL = 'https://ipjdmdjlrnfqtnqfnydn.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_2u0U4PTZuMNCS4LkTgnBBQ_ltfjZYqo';
  const STORAGE_BUCKET = 'blog-imagens'; // crie este bucket público no Supabase Storage
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let currentUser = null;
  let psicologoId = null;
  let isAdmin = false;
  let posts = [];
  let editingId = null;
  let coverUrl = null;
  let tags = [];

  function slugify(text){
    return (text || '')
      .toLowerCase()
      .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
      .replace(/[^a-z0-9\s-]/g, '')
      .trim()
      .replace(/\s+/g, '-')
      .replace(/-+/g, '-');
  }

  // ---------- Autenticação / gate de acesso ----------
  async function checkAccess(){
    const { data: { session } } = await supabase.auth.getSession();
    if(!session){
      document.getElementById('gateScreen').innerHTML =
        `Você precisa entrar para acessar o editor.<br><br><a href="login.html">Ir para o login →</a>`;
      return;
    }
    currentUser = session.user;

    const { data: psico } = await supabase
      .from('psicologos')
      .select('id')
      .eq('user_id', currentUser.id)
      .maybeSingle();

    const { data: admin } = await supabase
      .from('admins')
      .select('id')
      .eq('user_id', currentUser.id)
      .maybeSingle();

    if(!psico && !admin){
      document.getElementById('gateScreen').innerHTML =
        `Este editor é exclusivo para psicólogos e administradores da MeuPsi.<br><br><a href="dashboard.html">Voltar ao painel →</a>`;
      return;
    }

    psicologoId = psico ? psico.id : null;
    isAdmin = !!admin;

    document.getElementById('gateScreen').style.display = 'none';
    document.getElementById('app').style.display = 'block';

    loadPosts();
    resetEditor();
  }

  // ---------- Lista de posts ----------
  async function loadPosts(){
    let query = supabase.from('blog_posts').select('*').order('created_at', { ascending: false });
    if(!isAdmin) query = query.eq('psicologo_id', psicologoId);

    const { data, error } = await query;
    if(error){ console.error(error); return; }
    posts = data || [];
    renderPostList();
  }

  function renderPostList(){
    const box = document.getElementById('postList');
    if(!posts.length){
      box.innerHTML = `<p style="font-size:0.82rem;color:var(--muted);">Nenhum artigo ainda. Clique em "Novo artigo" para começar.</p>`;
      return;
    }
    box.innerHTML = posts.map(p => `
      <div class="post-list-item ${p.id===editingId?'active':''}" data-id="${p.id}">
        <h4>${p.titulo || '(sem título)'}</h4>
        <div class="meta-row">
          <span class="status-dot ${p.status}"></span>
          <span>${p.status}</span>
          <span>·</span>
          <span>${new Date(p.created_at).toLocaleDateString('pt-BR')}</span>
        </div>
      </div>
    `).join('');

    box.querySelectorAll('.post-list-item').forEach(el=>{
      el.addEventListener('click', ()=> loadIntoEditor(el.dataset.id));
    });
  }

  function loadIntoEditor(id){
    const post = posts.find(p => p.id === id);
    if(!post) return;
    editingId = post.id;

    document.getElementById('titulo').value = post.titulo || '';
    document.getElementById('resumo').value = post.resumo || '';
    document.getElementById('categoria').value = post.categoria || 'Saúde Mental';
    document.getElementById('status').value = post.status || 'rascunho';
    document.getElementById('editorContent').innerHTML = post.conteudo || '';
    document.getElementById('slugPreview').textContent = post.slug || 'seu-titulo-aqui';
    document.getElementById('deleteBtn').style.display = 'inline-block';

    coverUrl = post.imagem_capa || null;
    updateCoverPreview();

    tags = post.tags || [];
    renderTags();

    toggleScheduleField();
    if(post.agendado_para){
      document.getElementById('agendadoPara').value = post.agendado_para.slice(0,16);
    }

    document.getElementById('saveStatus').textContent = '';
    renderPostList();
    window.scrollTo({top:0, behavior:'smooth'});
  }

  function resetEditor(){
    editingId = null;
    coverUrl = null;
    tags = [];
    document.getElementById('titulo').value = '';
    document.getElementById('resumo').value = '';
    document.getElementById('categoria').value = 'Saúde Mental';
    document.getElementById('status').value = 'rascunho';
    document.getElementById('editorContent').innerHTML = '';
    document.getElementById('slugPreview').textContent = 'seu-titulo-aqui';
    document.getElementById('deleteBtn').style.display = 'none';
    document.getElementById('agendadoPara').value = '';
    updateCoverPreview();
    renderTags();
    toggleScheduleField();
    document.getElementById('saveStatus').textContent = '';
    renderPostList();
  }

  document.getElementById('newPostBtn').addEventListener('click', resetEditor);

  // ---------- Slug ao vivo ----------
  document.getElementById('titulo').addEventListener('input', (e)=>{
    document.getElementById('slugPreview').textContent = slugify(e.target.value) || 'seu-titulo-aqui';
  });

  // ---------- Status / agendamento ----------
  document.getElementById('status').addEventListener('change', toggleScheduleField);
  function toggleScheduleField(){
    const field = document.getElementById('scheduleField');
    field.classList.toggle('visible', document.getElementById('status').value === 'agendado');
  }

  // ---------- Tags ----------
  function renderTags(){
    const wrap = document.getElementById('tagWrap');
    wrap.querySelectorAll('.tag-chip').forEach(el => el.remove());
    tags.forEach((t, i) => {
      const chip = document.createElement('span');
      chip.className = 'tag-chip';
      chip.innerHTML = `#${t} <button type="button" data-i="${i}">×</button>`;
      wrap.insertBefore(chip, document.getElementById('tagInput'));
    });
    wrap.querySelectorAll('.tag-chip button').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        tags.splice(Number(btn.dataset.i), 1);
        renderTags();
      });
    });
  }

  document.getElementById('tagInput').addEventListener('keydown', (e)=>{
    if(e.key === 'Enter' && e.target.value.trim()){
      e.preventDefault();
      tags.push(e.target.value.trim().toLowerCase().replace(/\s+/g,'-'));
      e.target.value = '';
      renderTags();
    }
  });

  // ---------- Upload de capa ----------
  document.getElementById('coverUploader').addEventListener('click', ()=> document.getElementById('coverFile').click());
  document.getElementById('coverFile').addEventListener('change', async (e)=>{
    const file = e.target.files[0];
    if(!file) return;
    document.getElementById('coverHint').textContent = 'Enviando imagem…';
    const path = `capas/${Date.now()}-${slugify(file.name)}`;
    const { error } = await supabase.storage.from(STORAGE_BUCKET).upload(path, file, { upsert: true });
    if(error){
      document.getElementById('coverHint').textContent = 'Falha ao enviar. Verifique o bucket no Supabase Storage.';
      console.error(error);
      return;
    }
    const { data } = supabase.storage.from(STORAGE_BUCKET).getPublicUrl(path);
    coverUrl = data.publicUrl;
    updateCoverPreview();
  });

  function updateCoverPreview(){
    const img = document.getElementById('coverPreview');
    const hint = document.getElementById('coverHint');
    if(coverUrl){
      img.src = coverUrl;
      img.style.display = 'block';
      hint.textContent = 'Clique para trocar a imagem';
    } else {
      img.style.display = 'none';
      hint.textContent = 'Clique para enviar uma imagem (JPG ou PNG, recomendado 1200×675px)';
    }
  }

  // ---------- Toolbar do editor de texto ----------
  document.querySelectorAll('.toolbar button[data-cmd]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      document.getElementById('editorContent').focus();
      document.execCommand(btn.dataset.cmd, false, btn.dataset.val || null);
    });
  });

  document.getElementById('insertLinkBtn').addEventListener('click', ()=>{
    const url = prompt('Cole o endereço do link:');
    if(url){
      document.getElementById('editorContent').focus();
      document.execCommand('createLink', false, url);
    }
  });

  document.getElementById('insertImageBtn').addEventListener('click', ()=>{
    document.getElementById('bodyImageFile').click();
  });

  document.getElementById('bodyImageFile').addEventListener('change', async (e)=>{
    const file = e.target.files[0];
    if(!file) return;
    const path = `conteudo/${Date.now()}-${slugify(file.name)}`;
    const { error } = await supabase.storage.from(STORAGE_BUCKET).upload(path, file, { upsert: true });
    if(error){ alert('Falha ao enviar a imagem.'); console.error(error); return; }
    const { data } = supabase.storage.from(STORAGE_BUCKET).getPublicUrl(path);
    document.getElementById('editorContent').focus();
    document.execCommand('insertImage', false, data.publicUrl);
  });

  // ---------- Salvar ----------
  document.getElementById('saveBtn').addEventListener('click', savePost);

  async function savePost(){
    const titulo = document.getElementById('titulo').value.trim();
    if(!titulo){ alert('Dê um título ao artigo antes de salvar.'); return; }

    const status = document.getElementById('status').value;
    const payload = {
      titulo,
      slug: slugify(titulo),
      resumo: document.getElementById('resumo').value.trim(),
      conteudo: document.getElementById('editorContent').innerHTML,
      imagem_capa: coverUrl,
      categoria: document.getElementById('categoria').value,
      tags,
      status,
      agendado_para: status === 'agendado' ? document.getElementById('agendadoPara').value || null : null,
      updated_at: new Date().toISOString(),
    };

    if(status === 'publicado'){
      const existing = posts.find(p => p.id === editingId);
      if(!existing || !existing.publicado_em){
        payload.publicado_em = new Date().toISOString();
      }
    }

    document.getElementById('saveStatus').textContent = 'Salvando…';

    let result;
    if(editingId){
      result = await supabase.from('blog_posts').update(payload).eq('id', editingId).select().single();
    } else {
      payload.psicologo_id = psicologoId;
      result = await supabase.from('blog_posts').insert(payload).select().single();
    }

    if(result.error){
      document.getElementById('saveStatus').textContent = 'Erro ao salvar.';
      console.error(result.error);
      alert('Não foi possível salvar. Verifique se o título não está duplicado (a URL precisa ser única).');
      return;
    }

    editingId = result.data.id;
    document.getElementById('deleteBtn').style.display = 'inline-block';
    document.getElementById('saveStatus').textContent = `Salvo · ${new Date().toLocaleTimeString('pt-BR')}`;
    await loadPosts();
  }

  // ---------- Excluir ----------
  document.getElementById('deleteBtn').addEventListener('click', async ()=>{
    if(!editingId) return;
    if(!confirm('Excluir este artigo definitivamente?')) return;
    const { error } = await supabase.from('blog_posts').delete().eq('id', editingId);
    if(error){ alert('Erro ao excluir.'); console.error(error); return; }
    await loadPosts();
    resetEditor();
  });

  // ---------- Pré-visualizar ----------
  document.getElementById('previewBtn').addEventListener('click', async ()=>{
    if(!editingId){ alert('Salve o artigo ao menos uma vez para pré-visualizar.'); return; }
    const slug = slugify(document.getElementById('titulo').value);
    window.open(`post.html?slug=${encodeURIComponent(slug)}`, '_blank');
  });

  checkAccess();
</script>
</body>
</html>
