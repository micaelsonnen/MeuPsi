<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Editor do Blog — MeuPsi</title>
<meta name="robots" content="noindex, nofollow" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=Fraunces:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />

<link href="https://cdn.jsdelivr.net/npm/quill@2/dist/quill.snow.css" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/quill@2/dist/quill.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root {
  --cream: #F5E8ED; --rosa-50: #FDF0F4; --rosa-100: #F5DCE7; --rosa-200: #E8BDD0;
  --mauve-300: #D4ABBE; --mauve-500: #B87FA0;
  --lila-300: #C9ADE0; --lila-500: #9B6FD8; --lila-700: #6B3FA8; --lila-900: #3B1E62;
  --verde-500: #5AB593; --verde-600: #3F9B7A; --verde-50: #EBF7F2;
  --vermelho: #E05252; --vermelho-50: #FEF0F0;
  --gray-100: #EDE6EA; --gray-300: #BFB2BA; --gray-500: #7A6872; --gray-800: #2E2228;
  --sidebar-w: 240px;
  --font-display: 'Fraunces', Georgia, serif; --font-body: 'DM Sans', system-ui, sans-serif;
  --radius-sm: 8px; --radius-md: 14px; --radius-pill: 999px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-body); background: var(--cream); color: var(--gray-800); display: flex; min-height: 100vh; font-size: 15px; }
a { text-decoration: none; color: inherit; }
button { font-family: inherit; cursor: pointer; }

.sidebar { width: var(--sidebar-w); background: var(--lila-900); color: var(--lila-300); display: flex; flex-direction: column; padding: 1.5rem 1rem; gap: 4px; position: fixed; top: 0; left: 0; height: 100vh; overflow-y: auto; z-index: 50; }
.sidebar-logo { font-family: var(--font-display); font-size: 20px; font-style: italic; color: #fff; margin-bottom: 1.5rem; padding: 0 0.5rem; }
.sidebar-logo span { color: var(--verde-500); font-style: normal; }
.sidebar-label { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.3); padding: 0.9rem 0.5rem 0.3rem; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: 8px; cursor: pointer; color: var(--lila-300); transition: all 0.15s; font-size: 14px; border: none; background: none; width: 100%; text-align: left; }
.nav-item:hover { background: rgba(255,255,255,0.07); color: #fff; }
.nav-item.ativo { background: rgba(255,255,255,0.12); color: #fff; }
.sidebar-bottom { margin-top: auto; padding-top: 1rem; border-top: 1px solid rgba(255,255,255,0.08); }

.main { margin-left: var(--sidebar-w); flex: 1; display: flex; flex-direction: column; }
.topbar { background: var(--rosa-50); border-bottom: 1px solid var(--rosa-100); padding: 0 2rem; height: 60px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 40; }
.topbar h1 { font-family: var(--font-display); font-size: 18px; font-weight: 300; color: var(--lila-900); }
.content { padding: 2rem; flex: 1; max-width: 820px; }

.btn { display: inline-flex; align-items: center; gap: 6px; border-radius: var(--radius-pill); font-size: 13px; font-weight: 500; padding: 8px 18px; transition: all 0.18s; border: none; }
.btn-primary { background: var(--verde-500); color: #fff; }
.btn-primary:hover { background: var(--verde-600); }
.btn-ghost { background: transparent; border: 1.5px solid var(--mauve-300); color: var(--gray-800); }
.btn-ghost:hover { border-color: var(--lila-300); color: var(--lila-700); }
.btn-danger { background: var(--vermelho-50); color: var(--vermelho); border: 1.5px solid rgba(224,82,82,0.2); }
.btn-danger:hover { background: var(--vermelho); color: #fff; }

.tabs { display: flex; gap: 4px; margin-bottom: 1.5rem; background: var(--rosa-100); padding: 4px; border-radius: 10px; width: fit-content; }
.tab { padding: 7px 18px; border-radius: 8px; font-size: 13px; cursor: pointer; color: var(--gray-500); transition: all 0.15s; }
.tab.ativo { background: #fff; color: var(--lila-700); font-weight: 500; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }

.post-table { width: 100%; border-collapse: collapse; }
.post-table th { font-size: 11px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: var(--mauve-500); padding: 0.75rem 1rem; text-align: left; border-bottom: 1px solid var(--rosa-100); }
.post-table td { padding: 1rem; border-bottom: 1px solid var(--rosa-100); vertical-align: middle; }
.post-table tr:hover td { background: var(--rosa-50); }
.status-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 500; padding: 3px 10px; border-radius: var(--radius-pill); }
.status-publicado { background: var(--verde-50); color: var(--verde-600); }
.status-rascunho { background: var(--gray-100); color: var(--gray-500); }
.status-agendado { background: var(--rosa-100); color: var(--lila-700); }
.post-titulo-cell { font-weight: 500; color: var(--lila-900); }
.post-titulo-cell small { display: block; font-size: 11px; font-weight: 400; color: var(--mauve-300); margin-top: 2px; }
.acoes { display: flex; gap: 6px; }
.empty { text-align: center; padding: 3rem 1rem; color: var(--mauve-300); }

.editor-wrap { display: none; }
.editor-wrap.visivel { display: block; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
.form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 1rem; }
.form-group label { font-size: 12px; font-weight: 500; color: var(--mauve-500); letter-spacing: 0.05em; text-transform: uppercase; }
.form-group input, .form-group select, .form-group textarea { font-family: var(--font-body); font-size: 14px; border: 1.5px solid var(--rosa-100); border-radius: var(--radius-sm); padding: 9px 12px; background: #fff; color: var(--gray-800); outline: none; transition: border-color 0.18s; }
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--lila-300); }
.form-group textarea { resize: vertical; min-height: 70px; }
.slug-preview { font-size: 11px; color: var(--mauve-300); margin-top: 3px; }

.ql-container { font-family: var(--font-body); font-size: 15px; min-height: 300px; border-radius: 0 0 var(--radius-sm) var(--radius-sm); border-color: var(--rosa-100); }
.ql-toolbar { border-radius: var(--radius-sm) var(--radius-sm) 0 0; border-color: var(--rosa-100); background: var(--rosa-50); }

.capa-upload { border: 2px dashed var(--rosa-200); border-radius: var(--radius-md); padding: 1.6rem; text-align: center; cursor: pointer; transition: border-color 0.2s; background: var(--rosa-50); }
.capa-upload:hover { border-color: var(--lila-300); }
.capa-preview { width: 100%; max-height: 200px; object-fit: cover; border-radius: var(--radius-sm); display: none; margin-top: 1rem; }

.tag-input-wrap { display: flex; flex-wrap: wrap; gap: 6px; border: 1.5px solid var(--rosa-100); border-radius: var(--radius-sm); padding: 8px; background: #fff; }
.tag-chip { font-size: 12px; background: var(--rosa-100); color: var(--lila-700); padding: 4px 8px; border-radius: 14px; display: flex; align-items: center; gap: 6px; }
.tag-chip button { background: none; border: none; color: var(--lila-700); font-size: 0.85rem; line-height: 1; padding: 0; }
.tag-input-wrap input { border: none; outline: none; flex: 1; min-width: 90px; font-size: 13.5px; }

.schedule-field { display: none; }
.schedule-field.visivel { display: block; }

.toast-wrap { position: fixed; bottom: 1.5rem; right: 1.5rem; display: flex; flex-direction: column; gap: 8px; z-index: 999; }
.toast { padding: 12px 20px; border-radius: 10px; font-size: 14px; font-weight: 500; max-width: 320px; animation: slideIn 0.2s ease; }
.toast-ok { background: #fff; border: 1.5px solid var(--verde-500); color: var(--verde-600); }
.toast-erro { background: #fff; border: 1.5px solid var(--vermelho); color: var(--vermelho); }
@keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

.modal-bg { position: fixed; inset: 0; background: rgba(59,30,98,0.35); z-index: 200; display: none; align-items: center; justify-content: center; }
.modal-bg.visivel { display: flex; }
.modal { background: #fff; border-radius: var(--radius-md); padding: 2rem; max-width: 380px; width: 90%; }
.modal h3 { font-family: var(--font-display); font-weight: 300; color: var(--lila-900); margin-bottom: 0.75rem; }
.modal p { font-size: 14px; color: var(--gray-500); margin-bottom: 1.5rem; }
.modal-btns { display: flex; gap: 8px; justify-content: flex-end; }

.gate, .loading-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 14px; color: var(--gray-500); text-align: center; padding: 20px; font-family: var(--font-body); }
.gate a { color: var(--lila-700); font-weight: 600; }

@media (max-width: 880px) {
  .sidebar { display: none; }
  .main { margin-left: 0; }
  .form-row { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div id="gateScreen" class="loading-screen">Verificando acesso…</div>

<div id="app" style="display:none; width:100%;">
  <aside class="sidebar">
    <div class="sidebar-logo">Meu<span>Psi</span></div>
    <div class="sidebar-label">Blog</div>
    <button class="nav-item ativo" id="navLista" onclick="mostrarLista()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
      Posts
    </button>
    <button class="nav-item" onclick="novoPost()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 5v14M5 12h14"/></svg>
      Novo artigo
    </button>
    <div class="sidebar-bottom">
      <a class="nav-item" href="blog.html" target="_blank">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        Ver blog
      </a>
      <a class="nav-item" href="index.html">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Sair do editor
      </a>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <h1 id="topbarTitle">Seus artigos</h1>
      <div id="topbarBtns">
        <button class="btn btn-primary" onclick="novoPost()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
          Novo artigo
        </button>
      </div>
    </div>

    <div class="content">
      <div id="listaWrap">
        <div class="tabs">
          <div class="tab ativo" onclick="filtrarStatus('', this)">Todos</div>
          <div class="tab" onclick="filtrarStatus('publicado', this)">Publicados</div>
          <div class="tab" onclick="filtrarStatus('rascunho', this)">Rascunhos</div>
          <div class="tab" onclick="filtrarStatus('agendado', this)">Agendados</div>
        </div>
        <table class="post-table">
          <thead>
            <tr><th>Título</th><th>Categoria</th><th>Status</th><th>Data</th><th>Ações</th></tr>
          </thead>
          <tbody id="tabelaBody">
            <tr><td colspan="5" class="empty">Carregando…</td></tr>
          </tbody>
        </table>
      </div>

      <div class="editor-wrap" id="editorWrap">
        <div class="form-group">
          <label>Título *</label>
          <input type="text" id="fTitulo" placeholder="Título do artigo" oninput="gerarSlug()">
          <span class="slug-preview" id="slugPreview"></span>
        </div>

        <div class="form-group">
          <label>Resumo (aparece na listagem e nas redes sociais)</label>
          <textarea id="fResumo" maxlength="220" oninput="contarResumo()" placeholder="Em até 220 caracteres, resuma a ideia central do artigo."></textarea>
          <span class="slug-preview" id="resumoCount">0 / 220</span>
        </div>

        <div class="form-group">
          <label>Imagem de capa</label>
          <div class="capa-upload" id="coverUploader">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--mauve-300)" stroke-width="1.2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
            <p style="font-size:13px;color:var(--gray-500);margin-top:8px" id="coverHint">Clique para enviar uma imagem (JPG ou PNG)</p>
          </div>
          <img id="coverPreview" class="capa-preview">
          <input type="file" id="coverFile" accept="image/*" style="display:none">
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Categoria</label>
            <select id="fCategoria">
              <option>Saúde Mental</option><option>Ansiedade</option><option>Depressão</option>
              <option>Relacionamentos</option><option>Autoestima</option><option>Terapia Infantil</option><option>Burnout</option>
            </select>
          </div>
          <div class="form-group">
            <label>Status</label>
            <select id="fStatus">
              <option value="rascunho">Rascunho</option>
              <option value="publicado">Publicar agora</option>
              <option value="agendado">Agendar</option>
            </select>
          </div>
        </div>

        <div class="form-group schedule-field" id="scheduleField">
          <label>Data e hora da publicação</label>
          <input type="datetime-local" id="fAgendadoPara">
        </div>

        <div class="form-group">
          <label>Tags</label>
          <div class="tag-input-wrap" id="tagWrap">
            <input type="text" id="tagInput" placeholder="Digite e aperte Enter">
          </div>
        </div>

        <div class="form-group">
          <label>Conteúdo *</label>
          <div id="quillEditor"></div>
        </div>

        <div style="display:flex;gap:10px;margin-top:1rem;flex-wrap:wrap">
          <button class="btn btn-primary" onclick="salvar()">Salvar</button>
          <button class="btn btn-ghost" onclick="previsualizar()">Pré-visualizar</button>
          <button class="btn btn-ghost" onclick="mostrarLista()" style="margin-left:auto">Cancelar</button>
          <button class="btn btn-danger" id="btnDeletar" onclick="confirmarDeletar()" style="display:none">Excluir artigo</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="modal-bg" id="modalDeletar">
  <div class="modal">
    <h3>Excluir este artigo?</h3>
    <p>Esta ação é permanente e não pode ser desfeita.</p>
    <div class="modal-btns">
      <button class="btn btn-ghost" onclick="fecharModal()">Cancelar</button>
      <button class="btn btn-danger" onclick="deletar()">Excluir</button>
    </div>
  </div>
</div>

<div class="toast-wrap" id="toastWrap"></div>

<script>
  const SUPABASE_URL = 'https://ipjdmdjlrnfqtnqfnydn.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_2u0U4PTZuMNCS4LkTgnBBQ_ltfjZYqo';
  const STORAGE_BUCKET = 'blog-imagens';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let currentUser = null, psicologoId = null, isAdmin = false;
  let posts = [], filtroStatus = '', editingId = null, coverUrl = null, tags = [], quill = null;

  function toast(msg, tipo='ok'){
    const wrap = document.getElementById('toastWrap');
    const t = document.createElement('div');
    t.className = `toast toast-${tipo}`;
    t.textContent = msg;
    wrap.appendChild(t);
    setTimeout(()=>t.remove(), 3000);
  }

  function slugify(text){
    return (text || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '')
      .replace(/[^a-z0-9\s-]/g, '').trim().replace(/\s+/g, '-').replace(/-+/g, '-');
  }

  // ---------- Acesso ----------
  async function checkAccess(){
    const { data: { session } } = await sb.auth.getSession();
    if(!session){
      document.getElementById('gateScreen').innerHTML = `Você precisa entrar para acessar o editor.<br><br><a href="login.html">Ir para o login →</a>`;
      return;
    }
    currentUser = session.user;

    const { data: psico } = await sb.from('psicologos').select('id').eq('user_id', currentUser.id).maybeSingle();
    const { data: admin } = await sb.from('admins').select('id').eq('user_id', currentUser.id).maybeSingle();

    if(!psico && !admin){
      document.getElementById('gateScreen').innerHTML = `Este editor é exclusivo para psicólogos e administradores da MeuPsi.<br><br><a href="index.html">Voltar ao início →</a>`;
      return;
    }

    psicologoId = psico ? psico.id : null;
    isAdmin = !!admin;
    document.getElementById('gateScreen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    carregarPosts();
  }

  // ---------- Quill ----------
  function initQuill(){
    if(quill) return;
    quill = new Quill('#quillEditor', {
      theme: 'snow',
      modules: { toolbar: [[{ header: [2,3,false] }], ['bold','italic','underline'], [{ list:'ordered' }, { list:'bullet' }], ['blockquote','link','image'], ['clean']] }
    });
  }

  // ---------- Lista ----------
  function filtrarStatus(status, el){
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('ativo'));
    el.classList.add('ativo');
    filtroStatus = status;
    renderTabela();
  }

  async function carregarPosts(){
    let query = sb.from('blog_posts').select('*').order('created_at', { ascending: false });
    if(!isAdmin) query = query.eq('psicologo_id', psicologoId);
    const { data, error } = await query;
    if(error){ toast('Erro ao carregar artigos', 'erro'); return; }
    posts = data || [];
    renderTabela();
  }

  function renderTabela(){
    const tbody = document.getElementById('tabelaBody');
    const lista = filtroStatus ? posts.filter(p => p.status === filtroStatus) : posts;
    if(!lista.length){
      tbody.innerHTML = `<tr><td colspan="5" class="empty">Nenhum artigo por aqui ainda.</td></tr>`;
      return;
    }
    tbody.innerHTML = lista.map(p => `
      <tr>
        <td><span class="post-titulo-cell">${p.titulo || '(sem título)'}<small>${p.slug || ''}</small></span></td>
        <td style="font-size:13px;color:var(--gray-500)">${p.categoria || '—'}</td>
        <td><span class="status-badge status-${p.status}">${p.status === 'publicado' ? '● Publicado' : p.status === 'agendado' ? '◷ Agendado' : '○ Rascunho'}</span></td>
        <td style="font-size:12px;color:var(--mauve-300)">${p.publicado_em ? new Date(p.publicado_em).toLocaleDateString('pt-BR') : '—'}</td>
        <td><div class="acoes">
          <button class="btn btn-ghost" style="padding:5px 12px;font-size:12px" onclick="editarPost('${p.id}')">Editar</button>
          ${p.status === 'publicado' ? `<a class="btn btn-ghost" style="padding:5px 12px;font-size:12px" href="post.html?slug=${p.slug}" target="_blank">Ver</a>` : ''}
        </div></td>
      </tr>`).join('');
  }

  // ---------- Novo / Editar ----------
  function novoPost(){
    editingId = null; coverUrl = null; tags = [];
    document.getElementById('fTitulo').value = '';
    document.getElementById('fResumo').value = '';
    document.getElementById('fCategoria').value = 'Saúde Mental';
    document.getElementById('fStatus').value = 'rascunho';
    document.getElementById('fAgendadoPara').value = '';
    document.getElementById('slugPreview').textContent = '';
    document.getElementById('resumoCount').textContent = '0 / 220';
    document.getElementById('btnDeletar').style.display = 'none';
    updateCoverPreview();
    renderTags();
    toggleScheduleField();
    initQuill();
    quill.setContents([]);
    mostrarEditor('Novo artigo');
  }

  async function editarPost(id){
    const post = posts.find(p => p.id === id);
    if(!post) return;
    editingId = post.id;
    coverUrl = post.imagem_capa || null;
    tags = post.tags || [];

    document.getElementById('fTitulo').value = post.titulo || '';
    document.getElementById('fResumo').value = post.resumo || '';
    document.getElementById('fCategoria').value = post.categoria || 'Saúde Mental';
    document.getElementById('fStatus').value = post.status || 'rascunho';
    document.getElementById('slugPreview').textContent = post.slug ? `meupsi.com.br/post.html?slug=${post.slug}` : '';
    document.getElementById('resumoCount').textContent = (post.resumo || '').length + ' / 220';
    document.getElementById('btnDeletar').style.display = 'inline-flex';
    if(post.agendado_para) document.getElementById('fAgendadoPara').value = post.agendado_para.slice(0,16);

    updateCoverPreview();
    renderTags();
    toggleScheduleField();
    initQuill();
    quill.clipboard.dangerouslyPasteHTML(post.conteudo || '');
    mostrarEditor('Editar artigo');
  }

  function mostrarEditor(titulo){
    document.getElementById('listaWrap').style.display = 'none';
    document.getElementById('editorWrap').classList.add('visivel');
    document.getElementById('topbarTitle').textContent = titulo;
    document.getElementById('topbarBtns').innerHTML = `<button class="btn btn-ghost" onclick="mostrarLista()">← Voltar</button>`;
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('ativo'));
  }

  function mostrarLista(){
    document.getElementById('listaWrap').style.display = 'block';
    document.getElementById('editorWrap').classList.remove('visivel');
    document.getElementById('topbarTitle').textContent = 'Seus artigos';
    document.getElementById('topbarBtns').innerHTML = `<button class="btn btn-primary" onclick="novoPost()">+ Novo artigo</button>`;
    document.getElementById('navLista').classList.add('ativo');
    carregarPosts();
  }

  // ---------- Slug / contador ----------
  function gerarSlug(){
    const slug = slugify(document.getElementById('fTitulo').value);
    document.getElementById('slugPreview').textContent = slug ? `meupsi.com.br/post.html?slug=${slug}` : '';
  }
  function contarResumo(){
    document.getElementById('resumoCount').textContent = document.getElementById('fResumo').value.length + ' / 220';
  }
  function toggleScheduleField(){
    document.getElementById('scheduleField').classList.toggle('visivel', document.getElementById('fStatus').value === 'agendado');
  }
  document.getElementById('fStatus').addEventListener('change', toggleScheduleField);

  // ---------- Tags ----------
  function renderTags(){
    const wrap = document.getElementById('tagWrap');
    wrap.querySelectorAll('.tag-chip').forEach(el => el.remove());
    tags.forEach((t,i) => {
      const chip = document.createElement('span');
      chip.className = 'tag-chip';
      chip.innerHTML = `#${t} <button type="button" data-i="${i}">×</button>`;
      wrap.insertBefore(chip, document.getElementById('tagInput'));
    });
    wrap.querySelectorAll('.tag-chip button').forEach(btn => btn.addEventListener('click', ()=>{ tags.splice(Number(btn.dataset.i),1); renderTags(); }));
  }
  document.getElementById('tagInput').addEventListener('keydown', (e)=>{
    if(e.key === 'Enter' && e.target.value.trim()){
      e.preventDefault();
      tags.push(e.target.value.trim().toLowerCase().replace(/\s+/g,'-'));
      e.target.value = '';
      renderTags();
    }
  });

  // ---------- Capa ----------
  document.getElementById('coverUploader').addEventListener('click', ()=> document.getElementById('coverFile').click());
  document.getElementById('coverFile').addEventListener('change', async (e)=>{
    const file = e.target.files[0];
    if(!file) return;
    document.getElementById('coverHint').textContent = 'Enviando imagem…';
    const path = `capas/${Date.now()}-${slugify(file.name)}`;
    const { error } = await sb.storage.from(STORAGE_BUCKET).upload(path, file, { upsert: true });
    if(error){ document.getElementById('coverHint').textContent = 'Falha ao enviar imagem.'; toast('Erro no upload', 'erro'); return; }
    const { data } = sb.storage.from(STORAGE_BUCKET).getPublicUrl(path);
    coverUrl = data.publicUrl;
    updateCoverPreview();
  });
  function updateCoverPreview(){
    const img = document.getElementById('coverPreview');
    const hint = document.getElementById('coverHint');
    if(coverUrl){ img.src = coverUrl; img.style.display = 'block'; hint.textContent = 'Clique para trocar a imagem'; }
    else { img.style.display = 'none'; hint.textContent = 'Clique para enviar uma imagem (JPG ou PNG)'; }
  }

  // ---------- Salvar ----------
  async function salvar(){
    const titulo = document.getElementById('fTitulo').value.trim();
    if(!titulo){ toast('Dê um título ao artigo antes de salvar', 'erro'); return; }

    const status = document.getElementById('fStatus').value;
    const payload = {
      titulo,
      slug: slugify(titulo),
      resumo: document.getElementById('fResumo').value.trim(),
      conteudo: quill.root.innerHTML,
      imagem_capa: coverUrl,
      categoria: document.getElementById('fCategoria').value,
      tags,
      status,
      agendado_para: status === 'agendado' ? (document.getElementById('fAgendadoPara').value || null) : null,
      updated_at: new Date().toISOString(),
    };

    if(status === 'publicado'){
      const existing = posts.find(p => p.id === editingId);
      if(!existing || !existing.publicado_em) payload.publicado_em = new Date().toISOString();
    }

    let result;
    if(editingId){
      result = await sb.from('blog_posts').update(payload).eq('id', editingId).select().single();
    } else {
      payload.psicologo_id = psicologoId;
      result = await sb.from('blog_posts').insert(payload).select().single();
    }

    if(result.error){
      toast('Não foi possível salvar. Verifique se a URL não está duplicada.', 'erro');
      console.error(result.error);
      return;
    }

    editingId = result.data.id;
    document.getElementById('btnDeletar').style.display = 'inline-flex';
    toast(status === 'publicado' ? 'Artigo publicado!' : 'Salvo');
    await carregarPosts();
  }

  // ---------- Excluir ----------
  function confirmarDeletar(){ document.getElementById('modalDeletar').classList.add('visivel'); }
  function fecharModal(){ document.getElementById('modalDeletar').classList.remove('visivel'); }
  async function deletar(){
    fecharModal();
    if(!editingId) return;
    const { error } = await sb.from('blog_posts').delete().eq('id', editingId);
    if(error){ toast('Erro ao excluir', 'erro'); return; }
    toast('Artigo excluído');
    mostrarLista();
  }

  // ---------- Pré-visualizar ----------
  function previsualizar(){
    if(!editingId){ toast('Salve o artigo ao menos uma vez para pré-visualizar', 'erro'); return; }
    const slug = slugify(document.getElementById('fTitulo').value);
    window.open(`post.html?slug=${encodeURIComponent(slug)}`, '_blank');
  }

  checkAccess();
</script>
</body>
</html>
