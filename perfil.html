<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Perfil do Psicólogo — MeuPsi</title>
<meta name="description" content="Perfil de psicólogo na plataforma MeuPsi." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=Fraunces:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --rosa-50:  #FDF0F4;
  --rosa-100: #F5E2EA;
  --rosa-200: #EBC5D4;
  --malva:    #B87FA0;
  --lila-50:  #F3EEFA;
  --lila-100: #E8DCFA;
  --lila-300: #C4A8F0;
  --lila-500: #9B6FD8;
  --lila-700: #6B3FA8;
  --lila-900: #3B1E62;
  --verde-400: #5AB593;
  --verde-500: #4AA382;
  --verde-600: #38876A;
  --verde-50:  #E8F6F1;
  --cream:    #F5E8ED;
  --gray-100: #F0E0E8;
  --gray-300: #C8B4BC;
  --gray-500: #8A7080;
  --gray-800: #2E2229;
  --font-display: 'Fraunces', Georgia, serif;
  --font-body: 'DM Sans', system-ui, sans-serif;
  --radius-sm: 8px;
  --radius-md: 14px;
  --radius-lg: 22px;
  --radius-pill: 999px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { font-family: var(--font-body); background: var(--cream); color: var(--gray-800); font-size: 16px; line-height: 1.6; }
a { text-decoration: none; color: inherit; }

/* NAV */
nav {
  position: sticky; top: 0; z-index: 100;
  background: rgba(245,232,237,0.92); backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--rosa-200);
  padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 64px;
}
.nav-logo { font-family: var(--font-display); font-size: 22px; font-weight: 400; font-style: italic; color: var(--lila-700); }
.nav-logo span { color: var(--verde-500); font-style: normal; }
.nav-back { display: flex; align-items: center; gap: 6px; font-size: 14px; color: var(--gray-500); cursor: pointer; transition: color 0.2s; }
.nav-back:hover { color: var(--lila-700); }
.btn { display: inline-flex; align-items: center; gap: 6px; border-radius: var(--radius-pill); font-family: var(--font-body); font-size: 14px; font-weight: 500; padding: 9px 20px; cursor: pointer; transition: all 0.18s; border: none; }
.btn-primary { background: var(--verde-500); color: #fff; }
.btn-primary:hover { background: var(--verde-600); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(74,163,130,0.25); }
.btn-ghost { background: transparent; color: var(--gray-800); border: 1.5px solid var(--rosa-200); }
.btn-ghost:hover { border-color: var(--lila-300); color: var(--lila-700); }
.btn-lila { background: var(--lila-500); color: #fff; }
.btn-lila:hover { background: var(--lila-700); }
.btn-lila:disabled { background: var(--rosa-200); cursor: not-allowed; }

/* LAYOUT */
.page { max-width: 1000px; margin: 0 auto; padding: 2.5rem 2rem 4rem; }
.grid { display: grid; grid-template-columns: 300px 1fr; gap: 2rem; align-items: start; }

/* SIDEBAR */
.sidebar { display: flex; flex-direction: column; gap: 16px; }
.card {
  background: var(--rosa-50); border: 1.5px solid var(--rosa-200);
  border-radius: var(--radius-md); padding: 1.5rem;
}
.profile-card { text-align: center; }
.avatar-wrap { position: relative; display: inline-block; margin-bottom: 1rem; }
.avatar {
  width: 96px; height: 96px; border-radius: 50%;
  background: var(--rosa-200); color: var(--lila-700);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-display); font-size: 32px; font-weight: 300;
  margin: 0 auto; overflow: hidden;
}
.avatar img { width: 100%; height: 100%; object-fit: cover; }
.badge-online {
  position: absolute; bottom: 4px; right: 4px;
  width: 16px; height: 16px; border-radius: 50%;
  background: var(--verde-500); border: 2.5px solid var(--rosa-50);
}
.profile-name {
  font-family: var(--font-display); font-size: 20px;
  font-weight: 300; color: var(--lila-900); margin-bottom: 2px;
}
.profile-crp { font-size: 12px; color: var(--malva); margin-bottom: 8px; }
.profile-abordagem { font-size: 14px; color: var(--gray-500); margin-bottom: 1.25rem; }
.profile-tags { display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; margin-bottom: 1.25rem; }
.tag {
  font-size: 11px; padding: 3px 10px; border-radius: var(--radius-pill);
  background: var(--verde-50); color: var(--verde-600);
  border: 1px solid rgba(90,181,147,0.25);
}
.tag-lila {
  font-size: 11px; padding: 3px 10px; border-radius: var(--radius-pill);
  background: var(--lila-50); color: var(--lila-700);
  border: 1px solid var(--lila-100);
}
.profile-actions { display: flex; flex-direction: column; gap: 8px; }
.btn-wpp {
  width: 100%; padding: 11px;
  background: var(--verde-500); color: #fff;
  border: none; border-radius: var(--radius-sm);
  font-family: var(--font-body); font-size: 14px; font-weight: 500;
  cursor: pointer; transition: background 0.18s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn-wpp:hover { background: var(--verde-600); }
.btn-agendar {
  width: 100%; padding: 11px;
  background: var(--lila-500); color: #fff;
  border: none; border-radius: var(--radius-sm);
  font-family: var(--font-body); font-size: 14px; font-weight: 500;
  cursor: pointer; transition: background 0.18s;
}
.btn-agendar:hover { background: var(--lila-700); }

/* INFO CARD */
.info-row { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--rosa-100); }
.info-row:last-child { border-bottom: none; padding-bottom: 0; }
.info-icon { color: var(--lila-300); flex-shrink: 0; }
.info-label { font-size: 11px; color: var(--malva); margin-bottom: 1px; }
.info-value { font-size: 14px; color: var(--gray-800); font-weight: 500; }

/* MAIN */
.main { display: flex; flex-direction: column; gap: 20px; }
.card-title {
  font-family: var(--font-display); font-size: 17px;
  font-weight: 300; color: var(--lila-900); margin-bottom: 1rem;
}
.bio { font-size: 15px; color: var(--gray-500); line-height: 1.8; }
.bio p + p { margin-top: 1rem; }

/* ESPECIALIDADES */
.esp-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.esp-item {
  display: flex; align-items: center; gap: 8px;
  font-size: 14px; color: var(--gray-500); padding: 8px;
  background: var(--rosa-100); border-radius: var(--radius-sm);
}
.esp-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--lila-300); flex-shrink: 0; }

/* FORMAÇÃO */
.formacao-list { display: flex; flex-direction: column; gap: 12px; }
.formacao-item { display: flex; gap: 12px; }
.formacao-icon {
  width: 36px; height: 36px; border-radius: var(--radius-sm);
  background: var(--rosa-100); display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; color: var(--lila-500);
}
.formacao-titulo { font-size: 14px; font-weight: 500; color: var(--gray-800); }
.formacao-inst { font-size: 13px; color: var(--gray-500); }
.formacao-ano { font-size: 12px; color: var(--malva); }

/* AGENDAMENTO */
.agenda-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
.agenda-mes { font-size: 15px; font-weight: 500; text-transform: capitalize; }
.agenda-nav { display: flex; gap: 6px; }
.agenda-nav button {
  width: 30px; height: 30px; border-radius: var(--radius-sm);
  border: 1.5px solid var(--rosa-200); background: transparent;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  color: var(--gray-500); transition: all 0.18s;
}
.agenda-nav button:hover { border-color: var(--lila-300); color: var(--lila-700); }
.dias-semana {
  display: grid; grid-template-columns: repeat(7, 1fr);
  text-align: center; margin-bottom: 6px;
}
.dia-label { font-size: 11px; color: var(--malva); padding: 4px 0; }
.calendario {
  display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px;
  margin-bottom: 1.25rem;
}
.dia {
  aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
  border-radius: var(--radius-sm); font-size: 13px; cursor: pointer;
  transition: all 0.15s; color: var(--gray-800);
}
.dia:hover:not(.inativo):not(.selecionado) { background: var(--rosa-100); color: var(--lila-700); }
.dia.inativo { color: var(--rosa-200); cursor: default; }
.dia.disponivel { font-weight: 500; }
.dia.selecionado { background: var(--lila-500); color: #fff; font-weight: 500; }
.dia.hoje { border: 1.5px solid var(--lila-300); }
.horarios { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 1.25rem; }
.horario {
  font-size: 13px; padding: 7px 14px;
  border: 1.5px solid var(--rosa-200); border-radius: var(--radius-sm);
  cursor: pointer; transition: all 0.15s; color: var(--gray-500); background: var(--rosa-50);
}
.horario:hover { border-color: var(--lila-300); color: var(--lila-700); background: var(--rosa-100); }
.horario.selecionado { background: var(--lila-500); color: #fff; border-color: var(--lila-500); }

/* VALOR */
.valor-badge {
  display: inline-flex; align-items: baseline; gap: 4px;
  font-family: var(--font-display); color: var(--lila-900);
}
.valor-badge .cifrao { font-size: 14px; }
.valor-badge .numero { font-size: 22px; font-weight: 300; }
.valor-badge .periodo { font-size: 13px; color: var(--gray-500); }

.empty-msg { font-size: 13px; color: var(--gray-500); padding: 12px 0; }
#msgAgendamento { font-size: 13px; margin-bottom: 10px; min-height: 18px; }
#msgAgendamento.erro { color: #c0392b; }
#msgAgendamento.sucesso { color: var(--verde-600); }

@media (max-width: 720px) {
  .grid { grid-template-columns: 1fr; }
}
@media (max-width: 640px) {
  nav { padding: 0 1rem; }
  .page { padding: 1.5rem 1rem 3rem; }
}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">Meu<span>Psi</span></a>
  <a href="index.html" class="nav-back">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
    Voltar para busca
  </a>
</nav>

<div class="page" id="pageContent">
  <div class="grid">

    <!-- SIDEBAR -->
    <aside class="sidebar">

      <!-- Perfil -->
      <div class="card profile-card">
        <div class="avatar-wrap">
          <div class="avatar" id="avatar">--</div>
          <div class="badge-online" title="Aceita novos pacientes"></div>
        </div>
        <p class="profile-name" id="profileNome">Carregando…</p>
        <p class="profile-crp" id="profileCrp"></p>
        <p class="profile-abordagem" id="profileAbordagem"></p>
        <div class="profile-tags" id="profileTags"></div>
        <div class="profile-actions">
          <button class="btn-agendar" onclick="document.getElementById('cardAgenda').scrollIntoView({behavior:'smooth'})">Agendar sessão</button>
        </div>
      </div>

      <!-- Infos -->
      <div class="card">
        <div class="info-row">
          <div class="info-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
          </div>
          <div>
            <p class="info-label">Localização</p>
            <p class="info-value" id="infoCidade">—</p>
          </div>
        </div>
        <div class="info-row">
          <div class="info-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
          </div>
          <div>
            <p class="info-label">Duração da sessão</p>
            <p class="info-value">50 minutos</p>
          </div>
        </div>
        <div class="info-row">
          <div class="info-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20z"/><path d="M12 6v6l3 3"/></svg>
          </div>
          <div>
            <p class="info-label">Valor</p>
            <div class="valor-badge" id="infoValor">
              <span class="periodo">a combinar</span>
            </div>
          </div>
        </div>
        <div class="info-row">
          <div class="info-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 21.593c-5.63-5.539-11-10.297-11-14.402 0-3.791 3.068-5.191 5.281-5.191 1.312 0 4.151.501 5.719 4.457 1.59-3.968 4.464-4.447 5.726-4.447 2.54 0 5.274 1.621 5.274 5.181 0 4.069-5.136 8.625-11 14.402z"/></svg>
          </div>
          <div>
            <p class="info-label">Atendimento</p>
            <p class="info-value" id="infoModalidade">—</p>
          </div>
        </div>
      </div>

    </aside>

    <!-- MAIN -->
    <main class="main">

      <!-- Bio -->
      <div class="card">
        <h2 class="card-title">Sobre mim</h2>
        <div class="bio" id="profileBio">
          <p>Este psicólogo ainda não adicionou uma biografia.</p>
        </div>
      </div>

      <!-- Especialidades -->
      <div class="card" id="cardEspecialidades" style="display:none">
        <h2 class="card-title">Especialidades</h2>
        <div class="esp-grid" id="especialidadesGrid"></div>
      </div>

      <!-- Formação -->
      <div class="card" id="cardFormacao" style="display:none">
        <h2 class="card-title">Formação</h2>
        <div class="formacao-list" id="formacaoList"></div>
      </div>

      <!-- Agendamento -->
      <div class="card" id="cardAgenda">
        <h2 class="card-title">Agendar sessão</h2>
        <div class="agenda-header">
          <span class="agenda-mes" id="agendaMes">—</span>
          <div class="agenda-nav">
            <button id="btnMesAnterior">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
            </button>
            <button id="btnMesProximo">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg>
            </button>
          </div>
        </div>
        <div class="dias-semana">
          <span class="dia-label">Dom</span>
          <span class="dia-label">Seg</span>
          <span class="dia-label">Ter</span>
          <span class="dia-label">Qua</span>
          <span class="dia-label">Qui</span>
          <span class="dia-label">Sex</span>
          <span class="dia-label">Sáb</span>
        </div>
        <div class="calendario" id="calendario"></div>
        <p style="font-size:13px; color:var(--malva); margin-bottom:0.75rem;" id="horariosLabel">Selecione um dia disponível</p>
        <div class="horarios" id="horarios"></div>
        <div id="msgAgendamento"></div>
        <button class="btn btn-lila" id="btnConfirmar" style="width:100%; justify-content:center; padding:12px;" disabled>Confirmar agendamento</button>
      </div>

    </main>
  </div>
</div>

<script>
  const SUPA_URL = 'https://ipjdmdjlrnfqtnqfnydn.supabase.co';
  const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlwamRtZGpscm5mcXRucWZueWRuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI3MDc2MzksImV4cCI6MjA5ODI4MzYzOX0.j6YiDE_s7RO7p2Qy80jiSqSx9M24UIIbLcA9IrNecI8';
  const sb = window.supabase.createClient(SUPA_URL, SUPA_KEY);

  const params = new URLSearchParams(window.location.search);
  const psicologoId = params.get('id');

  let disponibilidade = {};   // { 'YYYY-MM-DD': [{id, hora}, ...] }
  let mesAtual = new Date();  // controla o mês exibido no calendário
  let diaSelecionado = null;
  let consultaSelecionadaId = null;

  const MESES = ['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];

  async function init() {
    if (!psicologoId) {
      document.getElementById('pageContent').innerHTML = '<p style="padding:2rem;">Psicólogo não especificado. Volte para a busca e escolha um perfil.</p>';
      return;
    }
    await carregarPsicologo();
    await carregarFormacao();
    await carregarDisponibilidade();
    await verificarCompatibilidadeConvenio();
    renderCalendario();

    document.getElementById('btnMesAnterior').addEventListener('click', () => {
      mesAtual.setMonth(mesAtual.getMonth() - 1);
      diaSelecionado = null;
      renderCalendario();
    });
    document.getElementById('btnMesProximo').addEventListener('click', () => {
      mesAtual.setMonth(mesAtual.getMonth() + 1);
      diaSelecionado = null;
      renderCalendario();
    });
    document.getElementById('btnConfirmar').addEventListener('click', confirmarAgendamento);
  }

  async function verificarCompatibilidadeConvenio() {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) return; // visitante não logado — nada a verificar ainda

    const { data: paciente } = await sb
      .from('pacientes')
      .select('instituicao:instituicoes(nome, valor_por_consulta)')
      .eq('id', session.user.id)
      .maybeSingle();

    const instituicao = paciente?.instituicao;
    if (!instituicao) return; // paciente particular, sem convênio — nada a avisar

    const compativel = psicologoAtual?.aceita_convenio && psicologoAtual?.valor_minimo_convenio <= instituicao.valor_por_consulta;
    if (!compativel) {
      const aviso = document.createElement('div');
      aviso.style.cssText = 'background:#fef3c7;color:#92400e;border-radius:10px;padding:12px 16px;margin-bottom:16px;font-size:13px;';
      aviso.textContent = `Este psicólogo não atende o seu convênio (${instituicao.nome}). Você ainda pode agendar como paciente particular.`;
      document.getElementById('pageContent').prepend(aviso);
    }
  }

  let psicologoAtual = null;

  async function carregarPsicologo() {
    const { data: p, error } = await sb
      .from('psicologos')
      .select('id, nome, crp, bio, especialidade, especialidades, abordagem, modalidade, cidade, preco_faixa, foto_url, aceita_convenio, valor_minimo_convenio')
      .eq('id', psicologoId)
      .single();

    if (error || !p) {
      document.getElementById('pageContent').innerHTML = '<p style="padding:2rem;">Psicólogo não encontrado.</p>';
      throw new Error('psicologo nao encontrado');
    }

    psicologoAtual = p;

    function esc(str) {
      if (str === null || str === undefined) return '';
      const div = document.createElement('div');
      div.textContent = String(str);
      return div.innerHTML;
    }

    document.title = (p.nome ?? 'Psicólogo') + ' — MeuPsi';
    document.getElementById('profileNome').textContent = p.nome ?? 'Psicólogo';
    document.getElementById('profileCrp').textContent = p.crp ? 'CRP ' + p.crp : '';
    document.getElementById('profileAbordagem').textContent = p.abordagem ?? '';

    const avatar = document.getElementById('avatar');
    if (p.foto_url) {
      avatar.innerHTML = `<img src="${esc(p.foto_url)}" alt="${esc(p.nome ?? '')}">`;
    } else {
      const iniciais = (p.nome ?? 'P').trim().split(' ').filter(Boolean).slice(0,2).map(w => w[0].toUpperCase()).join('');
      avatar.textContent = iniciais || 'P';
    }

    const tagsEl = document.getElementById('profileTags');
    const tags = [];
    if (p.especialidade) tags.push(`<span class="tag">${esc(p.especialidade)}</span>`);
    if (p.modalidade) tags.push(`<span class="tag-lila">${esc(p.modalidade)}</span>`);
    tagsEl.innerHTML = tags.join('');

    document.getElementById('infoCidade').textContent = p.cidade ?? '—';
    document.getElementById('infoModalidade').textContent = p.modalidade ?? '—';

    const valorEl = document.getElementById('infoValor');
    valorEl.innerHTML = p.preco_faixa
      ? `<span class="numero" style="font-size:16px;">${esc(p.preco_faixa)}</span>`
      : `<span class="periodo">a combinar</span>`;

    document.getElementById('profileBio').innerHTML = p.bio
      ? `<p>${esc(p.bio)}</p>`
      : '<p>Este psicólogo ainda não adicionou uma biografia.</p>';

    if (p.especialidades?.length) {
      document.getElementById('cardEspecialidades').style.display = '';
      document.getElementById('especialidadesGrid').innerHTML = p.especialidades.map(e => `
        <div class="esp-item"><div class="esp-dot"></div>${esc(e)}</div>
      `).join('');
    }
  }

  async function carregarFormacao() {
    const { data, error } = await sb
      .from('formacoes')
      .select('titulo, instituicao, ano_inicio, ano_fim')
      .eq('psicologo_id', psicologoId)
      .order('ordem', { ascending: true });

    if (error || !data?.length) return;

    document.getElementById('cardFormacao').style.display = '';
    document.getElementById('formacaoList').innerHTML = data.map(f => {
      const periodo = f.ano_inicio && f.ano_fim
        ? `${f.ano_inicio} – ${f.ano_fim}`
        : (f.ano_inicio || f.ano_fim || '');
      return `
        <div class="formacao-item">
          <div class="formacao-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>
          </div>
          <div>
            <p class="formacao-titulo">${esc(f.titulo)}</p>
            ${f.instituicao ? `<p class="formacao-inst">${esc(f.instituicao)}</p>` : ''}
            ${periodo ? `<p class="formacao-ano">${esc(periodo)}</p>` : ''}
          </div>
        </div>
      `;
    }).join('');
  }

  async function carregarDisponibilidade() {
    const hoje = new Date().toISOString().slice(0, 10);
    const { data, error } = await sb
      .from('consultas')
      .select('id, data, hora')
      .eq('psicologo_id', psicologoId)
      .eq('status', 'disponivel')
      .gte('data', hoje)
      .order('data')
      .order('hora');

    disponibilidade = {};
    if (!error && data) {
      data.forEach(c => {
        if (!disponibilidade[c.data]) disponibilidade[c.data] = [];
        disponibilidade[c.data].push({ id: c.id, hora: c.hora.slice(0,5) });
      });
    }
  }

  function renderCalendario() {
    const ano = mesAtual.getFullYear();
    const mes = mesAtual.getMonth();
    document.getElementById('agendaMes').textContent = `${MESES[mes]} ${ano}`;

    const primeiroDiaSemana = new Date(ano, mes, 1).getDay();
    const diasNoMes = new Date(ano, mes + 1, 0).getDate();
    const hojeStr = new Date().toISOString().slice(0, 10);

    const cal = document.getElementById('calendario');
    cal.innerHTML = '';

    for (let i = 0; i < primeiroDiaSemana; i++) {
      cal.innerHTML += '<div class="dia inativo"></div>';
    }

    for (let d = 1; d <= diasNoMes; d++) {
      const dataStr = `${ano}-${String(mes+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const temHorarios = !!disponibilidade[dataStr]?.length;
      const classes = ['dia'];
      if (temHorarios) classes.push('disponivel'); else classes.push('inativo');
      if (dataStr === hojeStr) classes.push('hoje');
      if (dataStr === diaSelecionado) classes.push('selecionado');

      const el = document.createElement('div');
      el.className = classes.join(' ');
      el.textContent = d;
      if (temHorarios) {
        el.addEventListener('click', () => selecionarDia(dataStr));
      }
      cal.appendChild(el);
    }

    if (diaSelecionado && disponibilidade[diaSelecionado]) {
      renderHorarios(diaSelecionado);
    } else {
      document.getElementById('horariosLabel').textContent = 'Selecione um dia disponível';
      document.getElementById('horarios').innerHTML = '';
      resetSelecaoHorario();
    }
  }

  function selecionarDia(dataStr) {
    diaSelecionado = dataStr;
    consultaSelecionadaId = null;
    renderCalendario();
  }

  function renderHorarios(dataStr) {
    const [ano, mes, dia] = dataStr.split('-');
    document.getElementById('horariosLabel').textContent =
      `Horários disponíveis — ${dia}/${mes}/${ano}`;

    const horariosEl = document.getElementById('horarios');
    horariosEl.innerHTML = disponibilidade[dataStr].map(h => `
      <div class="horario" data-id="${h.id}">${h.hora}</div>
    `).join('');

    horariosEl.querySelectorAll('.horario').forEach(el => {
      el.addEventListener('click', () => {
        horariosEl.querySelectorAll('.horario').forEach(h => h.classList.remove('selecionado'));
        el.classList.add('selecionado');
        consultaSelecionadaId = el.dataset.id;
        document.getElementById('btnConfirmar').disabled = false;
      });
    });

    resetSelecaoHorario();
  }

  function resetSelecaoHorario() {
    consultaSelecionadaId = null;
    document.getElementById('btnConfirmar').disabled = true;
  }

  async function confirmarAgendamento() {
    const msg = document.getElementById('msgAgendamento');
    msg.className = '';
    msg.textContent = '';

    if (!consultaSelecionadaId) {
      msg.textContent = 'Selecione um horário.';
      msg.className = 'erro';
      return;
    }

    const { data: { session } } = await sb.auth.getSession();
    if (!session) {
      window.location.href = 'login.html?redirect=' + encodeURIComponent(window.location.pathname + window.location.search);
      return;
    }

    const pacienteId = session.user.id;

    // Verifica se o paciente já está vinculado a outro psicólogo — não deixa trocar sem avisar
    const { data: vinculoAtual } = await sb
      .from('pacientes')
      .select('psicologo_id, status')
      .eq('id', pacienteId)
      .maybeSingle();

    if (vinculoAtual?.psicologo_id && vinculoAtual.psicologo_id !== psicologoId && vinculoAtual.status !== 'inativo') {
      const confirmarTroca = confirm(
        'Você já está em acompanhamento com outro psicólogo. Agendar com um profissional diferente vai substituir esse vínculo. Deseja continuar?'
      );
      if (!confirmarTroca) return;
    }

    const { data: usuario } = await sb.from('usuarios').select('nome, email, telefone').eq('id', pacienteId).single();
    const pacienteNome = usuario?.nome || session.user.email || 'Paciente';
    const pacienteEmail = usuario?.email || session.user.email || null;
    const pacienteTelefone = usuario?.telefone || null;

    const btn = document.getElementById('btnConfirmar');
    btn.disabled = true;
    btn.textContent = 'Agendando…';

    // garante que existe um registro do paciente vinculado a este psicólogo
    const { error: erroUpsert } = await sb
      .from('pacientes')
      .upsert({
        id: pacienteId,
        psicologo_id: psicologoId,
        status: 'pendente',
        nome: pacienteNome,
        email: pacienteEmail,
        telefone: pacienteTelefone,
      }, { onConflict: 'id' });

    if (erroUpsert) {
      msg.textContent = 'Erro ao vincular paciente: ' + erroUpsert.message;
      msg.className = 'erro';
      btn.disabled = false;
      btn.textContent = 'Confirmar agendamento';
      return;
    }

    // reserva o horário, só se ele ainda estiver disponível
    const { data: atualizado, error: erroConsulta } = await sb
      .from('consultas')
      .update({ paciente_id: pacienteId, status: 'agendado' })
      .eq('id', consultaSelecionadaId)
      .eq('status', 'disponivel')
      .select();

    if (erroConsulta) {
      msg.textContent = 'Erro ao agendar: ' + erroConsulta.message;
      msg.className = 'erro';
      btn.disabled = false;
      btn.textContent = 'Confirmar agendamento';
      return;
    }

    if (!atualizado || atualizado.length === 0) {
      msg.textContent = 'Esse horário acabou de ser reservado por outra pessoa. Escolha outro.';
      msg.className = 'erro';
      btn.disabled = false;
      btn.textContent = 'Confirmar agendamento';
      await carregarDisponibilidade();
      renderCalendario();
      return;
    }

    msg.textContent = 'Sessão agendada com sucesso!';
    msg.className = 'sucesso';
    btn.textContent = 'Agendado ✓';

    await carregarDisponibilidade();
    diaSelecionado = null;
    renderCalendario();
  }

  init();
</script>
</body>
</html>
