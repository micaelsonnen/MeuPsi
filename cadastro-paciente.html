<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastro — MeuPsi</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #fce8f0;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    .card {
      background: #fdf4f8; border-radius: 16px;
      padding: 40px; width: 100%; max-width: 440px;
      box-shadow: 0 4px 24px rgba(236,72,153,0.10);
    }
    .logo { font-size: 26px; font-weight: 700; color: #7c3aed; margin-bottom: 6px; }
    .subtitle { font-size: 14px; color: #6b7280; margin-bottom: 28px; }
    label { display: block; font-size: 13px; font-weight: 500; color: #6b21a8; margin-bottom: 5px; }
    input {
      width: 100%; padding: 10px 14px;
      border: 1.5px solid #e5e7eb; border-radius: 8px;
      font-size: 14px; color: #111827; margin-bottom: 16px;
      outline: none; transition: border-color 0.2s;
    }
    input:focus { border-color: #7c3aed; }
    .btn {
      width: 100%; padding: 12px;
      background: #86efac; color: #14532d;
      border: none; border-radius: 8px;
      font-size: 15px; font-weight: 600; cursor: pointer;
      transition: background 0.2s;
    }
    .btn:hover { background: #4ade80; }
    .btn:disabled { background: #bbf7d0; cursor: not-allowed; }
    .msg { margin-top: 12px; font-size: 13px; text-align: center; color: #ef4444; }
    .msg.ok { color: #10b981; }
    .footer { margin-top: 18px; text-align: center; font-size: 13px; color: #6b7280; }
    .footer a { color: #7c3aed; text-decoration: none; font-weight: 500; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">MeuPsi</div>
  <div class="subtitle">Crie sua conta como paciente.</div>

  <label>Nome completo</label>
  <input type="text" id="nome" placeholder="Maria da Silva" />

  <label>E-mail</label>
  <input type="email" id="email" placeholder="voce@email.com" />

  <label>Telefone (opcional)</label>
  <input type="text" id="telefone" placeholder="(11) 99999-9999" />

  <label>Senha</label>
  <input type="password" id="senha" placeholder="Mínimo 6 caracteres" />

  <label style="display:flex;align-items:flex-start;gap:8px;font-weight:400;cursor:pointer;margin-bottom:16px;">
    <input type="checkbox" id="aceiteTermos" style="width:auto;margin:2px 0 0;" />
    <span>Li e concordo com os <a href="termos.html" target="_blank" style="color:#7c3aed;">Termos de Uso</a> e a <a href="privacidade.html" target="_blank" style="color:#7c3aed;">Política de Privacidade</a>.</span>
  </label>

  <button class="btn" id="btnCadastrar">Criar conta</button>
  <div class="msg" id="msg"></div>

  <div class="footer">Já tem conta? <a href="login.html">Entrar</a></div>
</div>

<script>
  const SUPA_URL = 'https://ipjdmdjlrnfqtnqfnydn.supabase.co';
  const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlwamRtZGpscm5mcXRucWZueWRuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI3MDc2MzksImV4cCI6MjA5ODI4MzYzOX0.j6YiDE_s7RO7p2Qy80jiSqSx9M24UIIbLcA9IrNecI8';

  const sb = window.supabase.createClient(SUPA_URL, SUPA_KEY);

  document.getElementById('btnCadastrar').addEventListener('click', async () => {
    const nome = document.getElementById('nome').value.trim();
    const email = document.getElementById('email').value.trim();
    const telefone = document.getElementById('telefone').value.trim();
    const senha = document.getElementById('senha').value;
    const msg = document.getElementById('msg');
    const btn = document.getElementById('btnCadastrar');

    if (!nome || !email || !senha) {
      msg.textContent = 'Preencha nome, e-mail e senha.'; return;
    }
    if (senha.length < 6) {
      msg.textContent = 'Senha precisa ter ao menos 6 caracteres.'; return;
    }
    if (!document.getElementById('aceiteTermos').checked) {
      msg.textContent = 'É necessário aceitar os Termos de Uso e a Política de Privacidade.'; return;
    }

    btn.disabled = true;
    btn.textContent = 'Criando conta…';
    msg.textContent = '';

    // Criar usuário no Auth
    let data, error;
    try {
      ({ data, error } = await sb.auth.signUp({ email, password: senha }));
    } catch (e) {
      msg.textContent = 'Erro de rede: ' + e.message;
      btn.disabled = false;
      btn.textContent = 'Criar conta';
      return;
    }

    if (error) {
      msg.textContent = error.message;
      btn.disabled = false;
      btn.textContent = 'Criar conta';
      return;
    }

    const uid = data.user?.id;
    if (!uid) {
      msg.textContent = 'Erro inesperado: tente novamente.';
      btn.disabled = false;
      btn.textContent = 'Criar conta';
      return;
    }

    // Login automático para garantir sessão ativa antes de salvar o perfil
    const { error: loginErr } = await sb.auth.signInWithPassword({ email, password: senha });
    if (loginErr) {
      msg.textContent = 'Conta criada mas erro ao autenticar: ' + loginErr.message;
      btn.disabled = false;
      btn.textContent = 'Criar conta';
      return;
    }

    // Salvar perfil na tabela usuarios (agora com sessão ativa)
    const { error: upsertErr } = await sb.from('usuarios').upsert({
      id: uid, nome, email, telefone: telefone || null, papel: 'paciente'
    }, { onConflict: 'id' });

    if (upsertErr) {
      msg.textContent = 'Erro ao salvar perfil: ' + upsertErr.message;
      btn.disabled = false;
      btn.textContent = 'Criar conta';
      return;
    }

    // Registro formal de consentimento (não bloqueia o cadastro se falhar)
    try {
      let ip = null;
      try {
        const respIp = await fetch('https://api.ipify.org?format=json');
        ip = (await respIp.json()).ip || null;
      } catch (e) {}
      await sb.from('consentimentos').insert([
        { user_id: uid, tipo_documento: 'termos_uso', versao_documento: 'v1', ip, user_agent: navigator.userAgent },
        { user_id: uid, tipo_documento: 'politica_privacidade', versao_documento: 'v1', ip, user_agent: navigator.userAgent },
      ]);
    } catch (e) {}

    msg.className = 'msg ok';
    msg.textContent = 'Conta criada! Redirecionando…';
    setTimeout(() => { window.location.href = 'escolher-psicologo.html'; }, 1800);
  });
</script>
</body>
</html>
