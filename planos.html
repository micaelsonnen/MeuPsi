<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Planos para Psicólogos — MeuPsi</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=Fraunces:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
<style>
:root {
  --cream: #FDF6F8; --rose-50: #FAF0F4; --rose-200: #ECC8D8;
  --lila-300: #C9ADE0; --lila-700: #6B3FA8; --lila-900: #3B1E62;
  --verde-500: #5AB593; --gray-700: #4A4048; --gray-500: #8A7A85;
}
* { box-sizing: border-box; }
body { margin:0; background:var(--cream); color:var(--gray-700); font-family:'DM Sans',sans-serif; font-weight:300; }
.topbar { padding:1.25rem 2rem; background:#fff; border-bottom:1px solid var(--rose-200); display:flex; align-items:center; justify-content:space-between; }
.logo { font-family:'Fraunces',serif; font-style:italic; font-size:22px; color:var(--lila-900); text-decoration:none; }
.topbar a.voltar { font-size:13px; color:var(--lila-700); text-decoration:none; }
.wrap { max-width:640px; margin:0 auto; padding:4rem 1.5rem 6rem; text-align:center; }
h1 { font-family:'Fraunces',serif; font-weight:300; font-style:italic; font-size:32px; color:var(--lila-900); margin-bottom:1rem; }
p { font-size:15px; line-height:1.7; color:var(--gray-700); }
.card { background:#fff; border:1px solid var(--rose-200); border-radius:16px; padding:2.5rem; margin-top:2rem; }
.btn { display:inline-block; margin-top:1.5rem; padding:0.75rem 1.75rem; border-radius:999px; background:var(--verde-500); color:#fff; text-decoration:none; font-weight:500; }
</style>
</head>
<body>

<div class="topbar">
  <a class="logo" href="index.html">MeuPsi</a>
  <a class="voltar" href="index.html">← Voltar ao site</a>
</div>

<div class="wrap">
  <h1>Planos em breve</h1>
  <div class="card">
    <p>Estamos finalizando os detalhes dos planos para psicólogos. Enquanto isso, você já pode criar seu cadastro — a ativação do perfil não tem custo nesta fase inicial.</p>
    <a class="btn" href="cadastro.html">Cadastrar meu perfil</a>
  </div>
</div>

</body>
</html>
