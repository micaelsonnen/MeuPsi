<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — MeuPsi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #f0f4ff; min-height: 100vh; }

    /* ── Sidebar ── */
    .sidebar {
      position: fixed; top: 0; left: 0; height: 100vh; width: 240px;
      background: #fff; border-right: 1px solid #e5e7eb;
      display: flex; flex-direction: column; padding: 24px 16px;
    }
    .logo { font-size: 22px; font-weight: 700; color: #4f46e5; margin-bottom: 32px; padding-left: 8px; }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: 8px;
      font-size: 14px; font-weight: 500; color: #374151;
      cursor: pointer; text-decoration: none;
      transition: background 0.15s, color 0.15s;
      margin-bottom: 4px;
    }
    .nav-item:hover, .nav-item.active { background: #eef2ff; color: #4f46e5; }
    .nav-item svg { width: 18px; height: 18px; flex-shrink: 0; }
    .sidebar-footer { margin-top: auto; }
    .btn-sair {
      width: 100%; padding: 10px; background: none;
      border: 1.5px solid #e5e7eb; border-radius: 8px;
      font-size: 13px; font-weight: 500; color: #6b7280;
      cursor: pointer; transition: all 0.2s;
    }
    .btn-sair:hover { border-color: #ef4444; color: #ef4444; }

    /* ── Main ── */
    .main { margin-left: 240px; padding: 32px; }
    .page-header { margin-bottom: 28px; }
    .page-header h1 { font-size: 22px; font-weight: 700; color: #111827; }
    .page-header p { font-size: 14px; color: #6b7280; margin-top: 4px; }

    /* ── Cards de métricas ── */
    .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 28px; }
    .metric-card {
      background: #fff; border-radius: 12px;
      padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .metric-label { font-size: 12px; color: #6b7280; font-weight: 500; margin-bottom: 8px; }
    .metric-value { font-size: 28px; font-weight: 700; color: #111827; }

    /* ── Tabela de pacientes ── */
    .section-card {
      background: #fff; border-radius: 12px;
      padding: 24px; box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      margin-bottom: 24px;
    }
    .section-title {
      font-size: 16px; font-weight: 600; color: #111827;
      margin-bottom: 16px; display: flex; align-items: center;
      justify-content: space-between;
    }
    .btn-primary {
      padding: 8px 16px; background: #4f46e5; color: #fff;
      border: none; border-radius: 8px; font-size: 13px;
      font-weight: 500; cursor: pointer; transition: background 0.2s;
    }
    .btn-primary:hover { background: #4338ca; }

    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; font-size: 12px; font-weight: 600; color: #6b7280; padding: 0 12px 10px; }
    td { font-size: 14px; color: #374151; padding: 12px; border-top: 1px solid #f3f4f6; }
    tr:hover td { background: #f9fafb; }

    .badge {
      display: inline-block; padding: 2px 10px;
      border-radius: 99px; font-size: 11px; font-weight: 600;
    }
    .badge-ativo { background: #d1fae5; color: #065f46; }
    .badge-pendente { background: #fef3c7; color: #92400e; }
    .badge-inativo { background: #f3f4f6; color: #6b7280; }

    .empty { text-align: center; padding: 40px; color: #9ca3af; font-size: 14px; }

    /* Modal */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.4); z-index: 100;
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #fff; border-radius: 16px;
      padding: 32px; width: 100%; max-width: 480px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
    }
    .modal h2 { font-size: 18px; font-weight: 700; margin-bottom: 20px; color: #111827; }
    .modal label { display: block; font-size: 13px; font-weight: 500; color: #374151; margin-bottom: 6px; }
    .modal input, .modal select, .modal textarea {
      width: 100%; padding: 10px 14px;
      border: 1.5px solid #e5e7eb; border-radius: 8px;
      font-size: 14px; color: #111827; margin-bottom: 14px;
      outline: none; font-family: inherit;
    }
    .modal input:focus, .modal select:focus, .modal textarea:focus { border-color: #4f46e5; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 8px; }
    .btn-cancel {
      padding: 10px 20px; background: none;
      border: 1.5px solid #e5e7eb; border-radius: 8px;
      font-size: 14px; color: #6b7280; cursor: pointer;
    }
    #msgModal { font-size: 13px; color: #ef4444; margin-bottom: 8px; }
  </style>
</head>
<body>

<!-- Sidebar -->
<nav class="sidebar">
  <div class="logo">MeuPsi</div>
  <a class="nav-item active" href="dashboard-psicologo.html">
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
    Início
  </a>
  <a class="nav-item" href="#">
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
    Agenda
  </a>
  <a class="nav-item" href="#">
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
    Pacientes
  </a>
  <div class="sidebar-footer">
    <button class="btn-sair" id="btnSair">Sair</button>
  </div>
</nav>

<!-- Main -->
<main class="main">
  <div class="page-header">
    <h1>Olá, <span id="nomePsi">Psicólogo</span> 👋</h1>
    <p>Aqui está o resumo de hoje.</p>
  </div>

  <!-- Métricas -->
  <div class="metrics">
    <div class="metric-card">
      <div class="metric-label">Total de Pacientes</div>
      <div class="metric-value" id="totalPacientes">—</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">Ativos</div>
      <div class="metric-value" id="totalAtivos">—</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">Pendentes</div>
      <div class="metric-value" id="totalPendentes">—</div>
    </div>
  </div>

  <!-- Tabela de Pacientes -->
  <div class="section-card">
    <div class="section-title">
      Meus Pacientes
      <button class="btn-primary" id="btnAddPaciente">+ Adicionar Paciente</button>
    </div>
    <table>
      <thead>
        <tr>
          <th>Nome</th>
          <th>E-mail</th>
          <th>Telefone</th>
          <th>Status</th>
          <th>Desde</th>
        </tr>
      </thead>
      <tbody id="tabelaPacientes">
        <tr><td colspan="5" class="empty">Carregando…</td></tr>
      </tbody>
    </table>
  </div>
</main>

<!-- Modal: Adicionar Paciente -->
<div class="modal-overlay" id="modalAddPaciente">
  <div class="modal">
    <h2>Novo Paciente</h2>
    <label>Nome completo</label>
    <input type="text" id="mNome" placeholder="Maria da Silva" />
    <label>E-mail</label>
    <input type="email" id="mEmail" placeholder="maria@email.com" />
    <label>Telefone</label>
    <input type="text" id="mTelefone" placeholder="(11) 99999-9999" />
    <label>Status</label>
    <select id="mStatus">
      <option value="ativo">Ativo</option>
      <option value="pendente">Pendente</option>
      <option value="inativo">Inativo</option>
    </select>
    <div id="msgModal"></div>
    <div class="modal-actions">
      <button class="btn-cancel" id="btnCancelar">Cancelar</button>
      <button class="btn-primary" id="btnSalvar">Salvar</button>
    </div>
  </div>
</div>

<script>
  const SUPA_URL = 'https://gqjkslbktxxpyquuklty.supabase.co';
  const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdxamtzbGJrdHh4cHlxdXVrbHR5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDI3NTU5MDQsImV4cCI6MjA1ODMzMTkwNH0.aAuZPQKFnHvRK_63Gy8OOLnHDHd4sJlnDHLo1Vfy5yw';

  const sb = window.supabase.createClient(SUPA_URL, SUPA_KEY);
  let psiId = null;

  async function init() {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) { window.location.href = 'login.html'; return; }
    psiId = session.user.id;

    // Nome do psicólogo
    const { data: perfil } = await sb.from('usuarios').select('nome').eq('id', psiId).single();
    if (perfil?.nome) document.getElementById('nomePsi').textContent = perfil.nome.split(' ')[0];

    await carregarPacientes();
  }

  async function carregarPacientes() {
    const { data: pacientes, error } = await sb
      .from('pacientes')           // ← tabela correta
      .select('*')
      .eq('psicologo_id', psiId)
      .order('created_at', { ascending: false });

    const tbody = document.getElementById('tabelaPacientes');

    if (error || !pacientes?.length) {
      tbody.innerHTML = '<tr><td colspan="5" class="empty">Nenhum paciente cadastrado ainda.</td></tr>';
      document.getElementById('totalPacientes').textContent = 0;
      document.getElementById('totalAtivos').textContent = 0;
      document.getElementById('totalPendentes').textContent = 0;
      return;
    }

    document.getElementById('totalPacientes').textContent = pacientes.length;
    document.getElementById('totalAtivos').textContent = pacientes.filter(p => p.status === 'ativo').length;
    document.getElementById('totalPendentes').textContent = pacientes.filter(p => p.status === 'pendente').length;

    tbody.innerHTML = pacientes.map(p => `
      <tr>
        <td>${p.nome ?? '—'}</td>
        <td>${p.email ?? '—'}</td>
        <td>${p.telefone ?? '—'}</td>
        <td><span class="badge badge-${p.status ?? 'inativo'}">${p.status ?? 'inativo'}</span></td>
        <td>${p.created_at ? new Date(p.created_at).toLocaleDateString('pt-BR') : '—'}</td>
      </tr>
    `).join('');
  }

  // Modal
  document.getElementById('btnAddPaciente').addEventListener('click', () => {
    document.getElementById('modalAddPaciente').classList.add('open');
  });
  document.getElementById('btnCancelar').addEventListener('click', () => {
    document.getElementById('modalAddPaciente').classList.remove('open');
  });

  document.getElementById('btnSalvar').addEventListener('click', async () => {
    const nome = document.getElementById('mNome').value.trim();
    const email = document.getElementById('mEmail').value.trim();
    const telefone = document.getElementById('mTelefone').value.trim();
    const status = document.getElementById('mStatus').value;
    const msg = document.getElementById('msgModal');

    if (!nome || !email) { msg.textContent = 'Nome e e-mail são obrigatórios.'; return; }
    msg.textContent = '';

    const { error } = await sb.from('pacientes').insert({
      nome, email, telefone, status, psicologo_id: psiId
    });

    if (error) { msg.textContent = 'Erro ao salvar: ' + error.message; return; }

    document.getElementById('modalAddPaciente').classList.remove('open');
    document.getElementById('mNome').value = '';
    document.getElementById('mEmail').value = '';
    document.getElementById('mTelefone').value = '';
    await carregarPacientes();
  });

  document.getElementById('btnSair').addEventListener('click', async () => {
    await sb.auth.signOut();
    window.location.href = 'login.html';
  });

  init();
</script>
</body>
</html>
