<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Escolher psicólogo — MeuPsi</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #fce8f0; min-height: 100vh; padding: 40px 20px; }

    .container { max-width: 800px; margin: 0 auto; }
    .logo { font-size: 24px; font-weight: 700; color: #7c3aed; margin-bottom: 8px; }
    .subtitle { font-size: 15px; color: #6b7280; margin-bottom: 32px; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 20px;
    }

    .card {
      background: #fdf4f8;
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.07);
      transition: box-shadow 0.2s, transform 0.2s;
      cursor: pointer;
    }
    .card:hover { box-shadow: 0 4px 16px rgba(79,70,229,0.15); transform: translateY(-2px); }

    .avatar {
      width: 56px; height: 56px;
      border-radius: 50%;
      background: linear-gradient(135deg, #e879f9, #c084fc);
      display: flex; align-items: center; justify-content: center;
      color: #14532d; font-size: 22px; font-weight: 700;
      margin-bottom: 14px;
      overflow: hidden;
    }
    .avatar img { width: 100%; height: 100%; object-fit: cover; }

    .card-name { font-size: 16px; font-weight: 600; color: #111827; margin-bottom: 4px; }
    .card-crp { font-size: 12px; color: #6b7280; margin-bottom: 10px; }
    .card-bio { font-size: 13px; color: #4b5563; line-height: 1.5; margin-bottom: 12px; }

    .card-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
    .tag {
      font-size: 11px; font-weight: 500;
      background: #ede9fe; color: #6d28d9;
      padding: 3px 8px; border-radius: 999px;
    }

    .btn-escolher {
      display: block; width: 100%;
      padding: 10px; background: #86efac; color: #14532d;
      border: none; border-radius: 8px;
      font-size: 13px; font-weight: 600; cursor: pointer;
      transition: background 0.2s;
    }
    .btn-escolher:hover { background: #4ade80; }
    .btn-escolher:disabled { background: #bbf7d0; cursor: not-allowed; }

    .empty { text-align: center; color: #9ca3af; font-size: 14px; padding: 60px 0; }
    .msg-topo { margin-bottom: 16px; font-size: 13px; color: #10b981; font-weight: 500; }
    .msg-erro { color: #ef4444; }
  </style>
</head>
<body>
<div class="container">
  <div class="logo">MeuPsi</div>
  <div class="subtitle">Escolha o psicólogo que vai te acompanhar.</div>
  <div id="msgTopo" class="msg-topo" style="display:none"></div>
  <div class="grid" id="grid">
    <div class="empty">Carregando psicólogos…</div>
  </div>
</div>

<script>
  const SUPA_URL = 'https://ipjdmdjlrnfqtnqfnydn.supabase.co';
  const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlwamRtZGpscm5mcXRucWZueWRuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI3MDc2MzksImV4cCI6MjA5ODI4MzYzOX0.j6YiDE_s7RO7p2Qy80jiSqSx9M24UIIbLcA9IrNecI8';

  const sb = window.supabase.createClient(SUPA_URL, SUPA_KEY);
  let pacienteId = null;

  async function init() {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) { window.location.href = 'login.html'; return; }
    pacienteId = session.user.id;
    await carregarPsicologos();
  }

  async function carregarPsicologos() {
    const { data, error } = await sb
      .from('psicologos')
      .select('id, nome, crp, bio, especialidade, cidade, modalidade, preco_faixa, foto_url')
      .eq('ativo', true)
      .order('nome');

    const grid = document.getElementById('grid');

    if (error || !data?.length) {
      grid.innerHTML = '<div class="empty">Nenhum psicólogo disponível no momento.</div>';
      return;
    }

    grid.innerHTML = data.map(p => `
      <div class="card">
        <div class="avatar">
          ${p.foto_url
            ? `<img src="${p.foto_url}" alt="${p.nome ?? 'Psicólogo'}">`
            : (p.nome ?? 'P')[0].toUpperCase()}
        </div>
        <div class="card-name">${p.nome ?? 'Psicólogo'}</div>
        <div class="card-crp">${p.crp ? 'CRP ' + p.crp : ''}</div>
        <div class="card-bio">${p.bio ?? 'Psicólogo cadastrado na plataforma MeuPsi.'}</div>
        <div class="card-tags">
          ${p.especialidade ? `<span class="tag">${p.especialidade}</span>` : ''}
          ${p.modalidade ? `<span class="tag">${p.modalidade}</span>` : ''}
          ${p.cidade ? `<span class="tag">${p.cidade}</span>` : ''}
          ${p.preco_faixa ? `<span class="tag">${p.preco_faixa}</span>` : ''}
        </div>
        <button class="btn-escolher" data-id="${p.id}">Escolher</button>
      </div>
    `).join('');

    grid.querySelectorAll('.btn-escolher').forEach(btn => {
      btn.addEventListener('click', () => escolher(btn.dataset.id, btn));
    });
  }

  async function escolher(psicologoId, btn) {
    btn.disabled = true;
    btn.textContent = 'Vinculando…';

    const { error } = await sb
      .from('pacientes')
      .upsert({ id: pacienteId, psicologo_id: psicologoId, status: 'pendente' }, { onConflict: 'id' });

    const msg = document.getElementById('msgTopo');
    if (error) {
      msg.textContent = 'Erro ao escolher psicólogo: ' + error.message;
      msg.className = 'msg-topo msg-erro';
      msg.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Escolher';
      return;
    }

    msg.textContent = 'Psicólogo escolhido com sucesso! Redirecionando…';
    msg.style.display = 'block';
    setTimeout(() => { window.location.href = 'dashboard-paciente.html'; }, 1800);
  }

  init();
</script>
</body>
</html>
