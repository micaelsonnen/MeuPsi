<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escolher psicólogo — MeuPsi</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600&display=swap');
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #F7F4EF; --surface: #FFFFFF; --surface2: #f0ece6; --border: #E2DED8;
  --navy: #2D4A6B; --sage: #5B8C6E; --text: #1A2332; --muted: #6B7A8D; --error: #b91c1c;
}
body { background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; min-height: 100vh; }
.topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; gap: 16px; }
.logo-mark { width: 32px; height: 32px; background: linear-gradient(135deg, var(--navy), var(--sage)); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 800; color: white; }
.topbar h1 { font-size: 16px; font-weight: 700; color: var(--navy); }
.topbar a.voltar { margin-left: auto; font-size: 14px; color: var(--muted); }
.container { max-width: 760px; margin: 0 auto; padding: 28px; }
.intro h2 { font-family: 'DM Serif Display', serif; font-size: 24px; margin-bottom: 6px; }
.intro p { color: var(--muted); font-size: 14px; margin-bottom: 24px; }
.lista-psi { display: flex; flex-direction: column; gap: 14px; margin-bottom: 28px; }
.psi-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: 14px; padding: 18px 20px; cursor: pointer; transition: border-color 0.15s; }
.psi-card:hover { border-color: var(--navy); }
.psi-card.selecionado { border-color: var(--navy); background: rgba(45,74,107,0.05); }
.psi-nome { font-size: 16px; font-weight: 600; }
.psi-crp { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
.psi-abordagem { font-size: 13px; color: var(--navy); margin-bottom: 4px; }
.psi-bio { font-size: 13px; color: var(--muted); line-height: 1.5; }
.psi-valor { font-size: 13px; font-weight: 600; margin-top: 8px; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 20px; margin-bottom: 20px; }
.card h3 { font-size: 15px; font-weight: 600; margin-bottom: 14px; }
.field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
label { font-size: 13px; font-weight: 500; }
input[type="date"], input[type="time"], textarea { width: 100%; padding: 10px 12px; border: 1.5px solid var(--border); border-radius: 8px; font-family: inherit; font-size: 14px; }
textarea { resize: vertical; min-height: 70px; }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.btn-primary { background: linear-gradient(135deg, var(--navy), var(--sage)); color: white; border: none; padding: 12px 24px; border-radius: 999px; cursor: pointer; font-size: 14px; font-weight: 600; }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
.feedback { padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 14px; display: none; }
.feedback.erro { background: #FEE2E2; color: #991B1B; }
.feedback.sucesso { background: rgba(91,140,110,0.15); color: var(--sage); }
.loading, .sem-dados { text-align: center; color: var(--muted); padding: 30px; font-size: 14px; }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo-mark">M</div>
  <h1>Mind</h1>
  <a class="voltar" href="dashboard-paciente.html">← Voltar ao painel</a>
</div>

<div class="container">
  <div class="intro">
    <h2>Escolha seu psicólogo</h2>
    <p>Selecione um profissional, escolha um dia e horário, e envie o pedido. O psicólogo precisa aceitar para confirmar a sessão.</p>
  </div>

  <div id="lista-psi" class="lista-psi"><div class="loading">Carregando psicólogos…</div></div>

  <div class="card" id="card-agendamento" style="display:none">
    <h3>📅 Solicitar sessão com <span id="psi-escolhido-nome">—</span></h3>
    <div id="feedback" class="feedback"></div>
    <div class="field-row">
      <div class="field">
        <label for="data">Dia</label>
        <input type="date" id="data" />
      </div>
      <div class="field">
        <label for="hora">Horário</label>
        <input type="time" id="hora" />
      </div>
    </div>
    <div class="field">
      <label for="mensagem">Mensagem (opcional)</label>
      <textarea id="mensagem" placeholder="Conte rapidamente o motivo da busca ou alguma preferência de horário…"></textarea>
    </div>
    <button class="btn-primary" id="btnEnviar" onclick="enviarSolicitacao()">Enviar pedido de sessão</button>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://uqzmkctsjvjpohzbvtjv.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlwamRtZGpscm5mcXRucWZueWRuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI3MDc2MzksImV4cCI6MjA5ODI4MzYzOX0.j6YiDE_s7RO7p2Qy80jiSqSx9M24UIIbLcA9IrNecI8';
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let pacienteId = null;
let psiSelecionado = null;

async function init() {
  const { data: { session } } = await db.auth.getSession();
  if (!session) { location.href = 'login.html'; return; }

  const { data: p } = await db.from('pacientes').select('id').eq('user_id', session.user.id).maybeSingle();
  if (!p) { location.href = 'cadastro-paciente.html'; return; }
  pacienteId = p.id;

  carregarPsicologos();
}

async function carregarPsicologos() {
  // ajuste os nomes de coluna conforme seu schema real de "psicologos"
  const { data, error } = await db.from('psicologos')
    .select('id, nome, crp, abordagem, bio, valor_sessao')
    .eq('aceita_pacientes', true);

  const el = document.getElementById('lista-psi');
  if (error || !data?.length) {
    el.innerHTML = '<div class="sem-dados">Nenhum psicólogo disponível no momento.</div>';
    return;
  }

  el.innerHTML = data.map(psi => `
    <div class="psi-card" data-id="${psi.id}" data-nome="${psi.nome}" onclick="selecionarPsi(this)">
      <div class="psi-nome">${psi.nome}</div>
      <div class="psi-crp">CRP ${psi.crp || '—'}</div>
      ${psi.abordagem ? `<div class="psi-abordagem">${psi.abordagem}</div>` : ''}
      ${psi.bio ? `<div class="psi-bio">${psi.bio}</div>` : ''}
      ${psi.valor_sessao ? `<div class="psi-valor">R$ ${Number(psi.valor_sessao).toFixed(0)} / sessão</div>` : ''}
    </div>
  `).join('');
}

function selecionarPsi(el) {
  document.querySelectorAll('.psi-card').forEach(c => c.classList.remove('selecionado'));
  el.classList.add('selecionado');
  psiSelecionado = { id: el.dataset.id, nome: el.dataset.nome };
  document.getElementById('psi-escolhido-nome').textContent = psiSelecionado.nome;
  document.getElementById('card-agendamento').style.display = 'block';
  document.getElementById('card-agendamento').scrollIntoView({ behavior: 'smooth' });
}

async function enviarSolicitacao() {
  const fb = document.getElementById('feedback');
  const btn = document.getElementById('btnEnviar');
  const data = document.getElementById('data').value;
  const hora = document.getElementById('hora').value;
  const mensagem = document.getElementById('mensagem').value.trim();

  fb.style.display = 'none';
  if (!psiSelecionado || !data || !hora) {
    fb.className = 'feedback erro'; fb.style.display = 'block';
    fb.textContent = 'Escolha um psicólogo, dia e horário.'; return;
  }

  btn.disabled = true; btn.textContent = 'Enviando...';

  const data_hora = new Date(`${data}T${hora}:00`).toISOString();

  const { error } = await db.from('solicitacoes_sessao').insert({
    paciente_id: pacienteId,
    psicologo_id: psiSelecionado.id,
    data_hora,
    mensagem: mensagem || null,
    status: 'pendente'
  });

  btn.disabled = false; btn.textContent = 'Enviar pedido de sessão';

  if (error) {
    fb.className = 'feedback erro'; fb.style.display = 'block';
    fb.textContent = 'Erro ao enviar pedido: ' + error.message;
    return;
  }

  // marca o paciente como aguardando resposta deste psicólogo
  await db.from('pacientes').update({ status: 'aguardando_psicologo' }).eq('id', pacienteId);

  fb.className = 'feedback sucesso'; fb.style.display = 'block';
  fb.textContent = '✓ Pedido enviado! Você será avisado(a) quando o psicólogo confirmar.';
  setTimeout(() => location.href = 'dashboard-paciente.html', 1500);
}

init();
</script>

</body>
</html>
