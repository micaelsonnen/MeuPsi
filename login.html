<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entrar — MeuPsi</title>
  <meta name="description" content="Acesse sua conta MeuPsi e gerencie seus pacientes." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #f0f4ff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .logo {
      font-size: 28px;
      font-weight: 700;
      color: #4f46e5;
      margin-bottom: 8px;
    }
    .subtitle {
      color: #6b7280;
      font-size: 14px;
      margin-bottom: 32px;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #374151;
      margin-bottom: 6px;
    }
    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #e5e7eb;
      border-radius: 8px;
      font-size: 14px;
      color: #111827;
      margin-bottom: 18px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #4f46e5; }
    .btn {
      width: 100%;
      padding: 12px;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn:hover { background: #4338ca; }
    .btn:disabled { background: #a5b4fc; cursor: not-allowed; }
    .msg {
      margin-top: 14px;
      font-size: 13px;
      text-align: center;
      color: #ef4444;
    }
    .msg.success { color: #10b981; }
    .footer-link {
      margin-top: 20px;
      text-align: center;
      font-size: 13px;
      color: #6b7280;
    }
    .footer-link a { color: #4f46e5; text-decoration: none; font-weight: 500; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">MeuPsi</div>
  <div class="subtitle">Bem-vindo de volta. Faça login para continuar.</div>

  <label for="email">E-mail</label>
  <input type="email" id="email" placeholder="voce@email.com" />

  <label for="senha">Senha</label>
  <input type="password" id="senha" placeholder="••••••••" />

  <button class="btn" id="btnLogin">Entrar</button>
  <div class="msg" id="msg"></div>

  <div class="footer-link">
    Não tem conta? <a href="cadastro-paciente.html">Cadastre-se como paciente</a>
  </div>
</div>

<script>
  const SUPA_URL = 'https://gqjkslbktxxpyquuklty.supabase.co';
  const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh0eHpmanFreXlmanFreXkiLCJyb2xlIjoiYW5vbiIsImlhdCI6MTcxNjU1NjQ3NCwiZXhwIjoyMDMyMTMyNDc0fQ.placeholder';

  // Pegar as credenciais reais do arquivo colado
  const supabase = window.supabase.createClient(SUPA_URL, SUPA_KEY);

  document.getElementById('btnLogin').addEventListener('click', async () => {
    const email = document.getElementById('email').value.trim();
    const senha = document.getElementById('senha').value;
    const msg = document.getElementById('msg');
    const btn = document.getElementById('btnLogin');

    if (!email || !senha) {
      msg.textContent = 'Preencha e-mail e senha.';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Entrando…';
    msg.textContent = '';

    const { data, error } = await supabase.auth.signInWithPassword({ email, password: senha });

    if (error) {
      msg.textContent = 'E-mail ou senha inválidos.';
      btn.disabled = false;
      btn.textContent = 'Entrar';
      return;
    }

    // Redireciona conforme o papel do usuário
    const { data: perfil } = await supabase
      .from('usuarios')
      .select('papel')
      .eq('id', data.user.id)
      .single();

    if (perfil?.papel === 'psicologo') {
      window.location.href = 'dashboard-psicologo.html';
    } else {
      window.location.href = 'dashboard-paciente.html';
    }
  });
</script>
</body>
</html>
