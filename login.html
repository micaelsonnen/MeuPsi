<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entrar — MeuPsi</title>
  <meta name="description" content="Acesse sua conta MeuPsi e gerencie seus pacientes." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #fce8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #fdf4f8;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 4px 24px rgba(236,72,153,0.10);
    }
    .logo {
      font-size: 28px;
      font-weight: 700;
      color: #7c3aed;
      margin-bottom: 8px;
    }
    .subtitle {
      color: #6b7280;
      font-size: 14px;
      margin-bottom: 32px;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #6b21a8;
      margin-bottom: 6px;
    }
    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #e5e7eb;
      border-radius: 8px;
      font-size: 14px;
      color: #111827;
      margin-bottom: 18px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #7c3aed; }
    .btn {
      width: 100%;
      padding: 12px;
      background: #86efac;
      color: #14532d;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn:hover { background: #4ade80; }
    .btn:disabled { background: #bbf7d0; cursor: not-allowed; }
    .msg {
      margin-top: 14px;
      font-size: 13px;
      text-align: center;
      color: #ef4444;
    }
    .msg.success { color: #10b981; }
    .footer-link {
      margin-top: 20px;
      text-align: center;
      font-size: 13px;
      color: #6b7280;
    }
    .footer-link a { color: #7c3aed; text-decoration: none; font-weight: 500; }
    .senha-wrap { position: relative; }
    .senha-wrap input { padding-right: 42px; width: 100%; box-sizing: border-box; }
    .btn-olho {
      position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; padding: 4px;
      color: #9ca3af; display: flex; align-items: center;
    }
    .btn-olho:hover { color: #6b7280; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">MeuPsi</div>
  <div class="subtitle">Bem-vindo de volta. Faça login para continuar.</div>

  <label for="email">E-mail</label>
  <input type="email" id="email" placeholder="voce@email.com" />

  <label for="senha">Senha</label>
  <div class="senha-wrap">
    <input type="password" id="senha" placeholder="••••••••" />
    <button type="button" class="btn-olho" onclick="toggleSenha('senha', this)" aria-label="Mostrar senha" tabindex="-1">
      <svg class="icone-olho-aberto" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg>
      <svg class="icone-olho-fechado" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="display:none"><path d="M17.94 17.94A10.94 10.94 0 0112 19c-7 0-11-7-11-7a21.8 21.8 0 015.06-6.06M9.9 4.24A10.94 10.94 0 0112 4c7 0 11 7 11 7a21.8 21.8 0 01-3.22 4.34M14.12 14.12a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
    </button>
  </div>

  <button class="btn" id="btnLogin">Entrar</button>
  <div class="msg" id="msg"></div>

  <div class="footer-link">
    Não tem conta? <a href="cadastro-paciente.html">Cadastre-se como paciente</a>
  </div>
</div>

<script>
  const SUPA_URL = 'https://ipjdmdjlrnfqtnqfnydn.supabase.co';
  const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlwamRtZGpscm5mcXRucWZueWRuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI3MDc2MzksImV4cCI6MjA5ODI4MzYzOX0.j6YiDE_s7RO7p2Qy80jiSqSx9M24UIIbLcA9IrNecI8';

  const sb = window.supabase.createClient(SUPA_URL, SUPA_KEY);

  function toggleSenha(inputId, btn) {
    const input = document.getElementById(inputId);
    const aberto = btn.querySelector('.icone-olho-aberto');
    const fechado = btn.querySelector('.icone-olho-fechado');
    const mostrando = input.type === 'text';
    input.type = mostrando ? 'password' : 'text';
    aberto.style.display = mostrando ? 'block' : 'none';
    fechado.style.display = mostrando ? 'none' : 'block';
  }

  document.getElementById('btnLogin').addEventListener('click', async () => {
    const email = document.getElementById('email').value.trim();
    const senha = document.getElementById('senha').value;
    const msg = document.getElementById('msg');
    const btn = document.getElementById('btnLogin');

    if (!email || !senha) {
      msg.textContent = 'Preencha e-mail e senha.';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Entrando…';
    msg.textContent = '';

    const { data, error } = await sb.auth.signInWithPassword({ email, password: senha });

    if (error) {
      msg.textContent = 'E-mail ou senha inválidos.';
      btn.disabled = false;
      btn.textContent = 'Entrar';
      return;
    }

    // Redireciona conforme o tipo de conta.
    // Não usamos usuarios.papel para psicólogo porque o cadastro de
    // psicólogo nunca grava nada em "usuarios" — só em "psicologos".
    const { data: psi } = await sb
      .from('psicologos')
      .select('id')
      .eq('user_id', data.user.id)
      .maybeSingle();

    if (psi) {
      window.location.href = 'dashboard-psicologo.html';
    } else {
      window.location.href = 'dashboard-paciente.html';
    }
  });
</script>
</body>
</html>
