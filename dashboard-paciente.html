<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meu espaço — MeuPsi</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #f0f4ff; min-height: 100vh; }

    .sidebar {
      position: fixed; top: 0; left: 0; height: 100vh; width: 240px;
      background: #fff; border-right: 1px solid #e5e7eb;
      display: flex; flex-direction: column; padding: 24px 16px;
    }
    .logo { font-size: 22px; font-weight: 700; color: #4f46e5; margin-bottom: 32px; padding-left: 8px; }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: 8px;
      font-size: 14px; font-weight: 500; color: #374151;
      text-decoration: none; transition: background 0.15s, color 0.15s;
      margin-bottom: 4px;
    }
    .nav-item:hover, .nav-item.active { background: #eef2ff; color: #4f46e5; }
    .nav-item svg { width: 18px; height: 18px; }
    .sidebar-footer { margin-top: auto; }
    .btn-sair {
      width: 100%; padding: 10px; background: none;
      border: 1.5px solid #e5e7eb; border-radius: 8px;
      font-size: 13px; font-weight: 500; color: #6b7280; cursor: pointer;
      transition: all 0.2s;
    }
    .btn-sair:hover { border-color: #ef4444; color: #ef4444; }

    .main { margin-left: 240px; padding: 32px; }
    .page-header { margin-bottom: 28px; }
    .page-header h1 { font-size: 22px; font-weight: 700; color: #111827; }
    .page-header p { font-size: 14px; color: #6b7280; margin-top: 4px; }

    .section-card {
      background: #fff; border-radius: 12px;
      padding: 24px; box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      margin-bottom: 24px;
    }
    .section-title { font-size: 16px; font-weight: 600; color: #111827; margin-bottom: 14px; }

    .info-row { display: flex; gap: 8px; margin-bottom: 10px; font-size: 14px; }
    .info-label { color: #6b7280; font-weight: 500; min-width: 120px; }
    .info-value { color: #111827; }

    .badge {
      display: inline-block; padding: 2px 10px;
      border-radius: 99px; font-size: 12px; font-weight: 600;
    }
    .badge-ativo { background: #d1fae5; color: #065f46; }
    .badge-pendente { background: #fef3c7; color: #92400e; }
    .badge-inativo { background: #f3f4f6; color: #6b7280; }

    .alert {
      background: #fffbeb; border: 1px solid #fde68a;
      border-radius: 10px; padding: 16px; font-size: 14px; color: #92400e;
      margin-bottom: 24px;
    }
    .alert a { color: #4f46e5; font-weight: 600; text-decoration: none; }

    .psi-card {
      display: flex; align-items: center; gap: 16px;
    }
    .psi-avatar {
      width: 52px; height: 52px; border-radius: 50%;
      background: linear-gradient(135deg, #6366f1, #a78bfa);
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 20px; font-weight: 700; flex-shrink: 0;
    }
    .psi-info h3 { font-size: 16px; font-weight: 600; color: #111827; }
    .psi-info p { font-size: 13px; color: #6b7280; margin-top: 2px; }
  </style>
</head>
<body>

<nav class="sidebar">
  <div class="logo">MeuPsi</div>
  <a class="nav-item active" href="dashboard-paciente.html">
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
    Meu espaço
  </a>
  <a class="nav-item" href="escolher-psicologo.html">
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
    Trocar psicólogo
  </a>
  <div class="sidebar-footer">
    <button class="btn-sair" id="btnSair">Sair</button>
  </div>
</nav>

<main class="main">
  <div class="page-header">
    <h1>Olá, <span id="nomePaciente">Paciente</span> 👋</h1>
    <p>Bem-vindo ao seu espaço no MeuPsi.</p>
  </div>

  <!-- Alerta se não tem psicólogo -->
  <div class="alert" id="alertSemPsi" style="display:none">
    Você ainda não escolheu um psicólogo.
    <a href="escolher-psicologo.html">Clique aqui para escolher</a>.
  </div>

  <!-- Card do psicólogo -->
  <div class="section-card" id="cardPsi" style="display:none">
    <div class="section-title">Meu psicólogo</div>
    <div class="psi-card">
      <div class="psi-avatar" id="psiAvatar">P</div>
      <div class="psi-info">
        <h3 id="psiNome">—</h3>
        <p id="psiCrp">—</p>
      </div>
    </div>
  </div>

  <!-- Meus dados -->
  <div class="section-card">
    <div class="section-title">Meus dados</div>
    <div class="info-row"><span class="info-label">Nome</span><span class="info-value" id="infoNome">—</span></div>
    <div class="info-row"><span class="info-label">E-mail</span><span class="info-value" id="infoEmail">—</span></div>
    <div class="info-row"><span class="info-label">Telefone</span><span class="info-value" id="infoTelefone">—</span></div>
    <div class="info-row"><span class="info-label">Status</span><span class="info-value" id="infoStatus">—</span></div>
  </div>
</main>

<script>
  const SUPA_URL = 'https://gqjkslbktxxpyquuklty.supabase.co';
  const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdxamtzbGJrdHh4cHlxdXVrbHR5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDI3NTU5MDQsImV4cCI6MjA1ODMzMTkwNH0.aAuZPQKFnHvRK_63Gy8OOLnHDHd4sJlnDHLo1Vfy5yw';

  const sb = window.supabase.createClient(SUPA_URL, SUPA_KEY);

  async function init() {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) { window.location.href = 'login.html'; return; }

    const uid = session.user.id;

    // Busca perfil do paciente
    const { data: perfil } = await sb
      .from('usuarios')
      .select('nome, email, telefone')
      .eq('id', uid)
      .single();

    if (perfil) {
      const primeiroNome = (perfil.nome ?? '').split(' ')[0] || 'Paciente';
      document.getElementById('nomePaciente').textContent = primeiroNome;
      document.getElementById('infoNome').textContent = perfil.nome ?? '—';
      document.getElementById('infoEmail').textContent = perfil.email ?? session.user.email ?? '—';
      document.getElementById('infoTelefone').textContent = perfil.telefone ?? '—';
    }

    // Busca vínculo com psicólogo
    const { data: paciente } = await sb
      .from('pacientes')
      .select('psicologo_id, status')
      .eq('id', uid)
      .single();

    if (!paciente?.psicologo_id) {
      document.getElementById('alertSemPsi').style.display = 'block';
      document.getElementById('infoStatus').innerHTML = '<span class="badge badge-pendente">sem psicólogo</span>';
      return;
    }

    // Status
    const s = paciente.status ?? 'pendente';
    document.getElementById('infoStatus').innerHTML = `<span class="badge badge-${s}">${s}</span>`;

    // Dados do psicólogo
    const { data: psi } = await sb
      .from('usuarios')
      .select('nome, crp')
      .eq('id', paciente.psicologo_id)
      .single();

    if (psi) {
      document.getElementById('cardPsi').style.display = 'block';
      document.getElementById('psiNome').textContent = psi.nome ?? 'Psicólogo';
      document.getElementById('psiCrp').textContent = psi.crp ? 'CRP ' + psi.crp : '';
      document.getElementById('psiAvatar').textContent = (psi.nome ?? 'P')[0].toUpperCase();
    }
  }

  document.getElementById('btnSair').addEventListener('click', async () => {
    await sb.auth.signOut();
    window.location.href = 'login.html';
  });

  init();
</script>
</body>
</html>
